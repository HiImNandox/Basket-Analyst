<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HoopStats · Jugadores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red:#cc1414; --red-dim:#991010; --red-glow:rgba(204,20,20,0.12); --red-border:rgba(204,20,20,0.3);
    --bg:#111111; --panel:#1a1a1a; --panel2:#222222; --panel3:#2a2a2a;
    --border:#2e2e2e; --border2:#3a3a3a;
    --text:#f0f0f0; --text2:#aaaaaa; --muted:#666666;
    --bebas:'Bebas Neue',sans-serif; --barlow:'Barlow Condensed',sans-serif; --mono:'JetBrains Mono',monospace;
    --sidebar-w:230px; --radius:10px;
  }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--barlow); overflow:hidden; }

  /* ─── LAYOUT ─── */
  .app { display:flex; height:100vh; height:100dvh; overflow:hidden; }
  .sidebar { width:var(--sidebar-w); min-width:var(--sidebar-w); background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; height:100vh; height:100dvh; }
  .sidebar-logo { padding:28px 22px 22px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .logo-eyebrow { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .logo-name { font-family:var(--bebas); font-size:28px; letter-spacing:3px; color:var(--text); line-height:1; }
  .logo-club { font-size:11px; color:var(--text2); font-weight:600; margin-top:4px; }
  .logo-accent { width:40px; height:3px; background:var(--red); margin-top:12px; border-radius:2px; }
  .sidebar-nav { flex:1; padding:16px 0; overflow-y:auto; }
  .nav-section-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); padding:14px 22px 6px; }
  .nav-item { display:flex; align-items:center; gap:12px; padding:11px 22px; font-size:14px; font-weight:600; letter-spacing:.5px; color:var(--text2); border-left:3px solid transparent; transition:background .15s,color .15s; text-decoration:none; }
  .nav-item:hover { background:var(--panel2); color:var(--text); }
  .nav-item.active { color:var(--red); border-left-color:var(--red); background:var(--red-glow); }
  .nav-item svg { width:16px; height:16px; flex-shrink:0; opacity:.7; }
  .nav-item.active svg { opacity:1; }
  .sidebar-bottom { padding:16px; border-top:1px solid var(--border); flex-shrink:0; }
  .user-card { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--panel2); border:1px solid var(--border); border-radius:8px; }
  .user-avatar { width:34px; height:34px; border-radius:50%; background:var(--red); display:flex; align-items:center; justify-content:center; font-family:var(--bebas); font-size:13px; color:white; flex-shrink:0; }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:13px; font-weight:700; color:var(--text); }
  .user-role { font-size:11px; color:var(--muted); }

  /* ─── MAIN ─── */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
  .topbar { padding:20px 28px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .topbar-left { display:flex; align-items:center; gap:14px; }
  .topbar-breadcrumb { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
  .topbar-title { font-family:var(--bebas); font-size:30px; letter-spacing:2px; line-height:1; }
  .back-btn { display:none; align-items:center; gap:8px; background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:8px 14px; cursor:pointer; font-family:var(--barlow); font-size:13px; font-weight:700; color:var(--text2); transition:color .15s,border-color .15s; }
  .back-btn:hover { color:var(--text); border-color:var(--border2); }
  .back-btn svg { width:14px; height:14px; }
  .back-btn.visible { display:flex; }
  .content { flex:1; overflow-y:auto; padding:24px 28px 32px; }
  .content::-webkit-scrollbar { width:4px; }
  .content::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

  /* ─── VISTA EQUIPOS ─── */
  .view { display:none; }
  .view.active { display:block; }

  .section-title { font-family:var(--bebas); font-size:20px; letter-spacing:2px; margin-bottom:4px; }
  .section-sub { font-size:12px; color:var(--muted); margin-bottom:20px; }

  .teams-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }

  .team-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 16px 20px;
    cursor: pointer;
    text-align: center;
    transition: border-color .2s, background .2s, transform .15s;
    position: relative;
    overflow: hidden;
  }
  .team-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--team-color, var(--red));
    opacity: 0;
    transition: opacity .2s;
  }
  .team-card:hover { border-color: var(--team-color, var(--red)); transform: translateY(-2px); }
  .team-card:hover::before { opacity: 0.04; }
  .team-card:active { transform: translateY(0); }

  .team-badge-wrap {
    width: 80px; height: 80px;
    border-radius: 50%;
    margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--team-color, var(--red)) 15%, var(--panel2));
    border: 2px solid color-mix(in srgb, var(--team-color, var(--red)) 30%, transparent);
    position: relative;
    z-index: 1;
  }
  .team-badge-img {
    width: 60px; height: 60px;
    border-radius: 50%;
    object-fit: cover;
    display: none;
  }
  .team-badge-img.loaded { display: block; }
  .team-badge-letters {
    font-family: var(--bebas);
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--team-color, var(--red));
  }
  .team-name {
    font-size: 14px; font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 6px;
    position: relative; z-index: 1;
  }
  .team-count {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    position: relative; z-index: 1;
  }
  .team-sac-pill {
    position: absolute; top: 10px; right: 10px;
    background: var(--red-glow); border: 1px solid var(--red-border);
    color: var(--red); font-size: 9px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 2px 6px; border-radius: 4px;
  }

  /* ─── PERFIL JUGADOR ─── */
  .player-profile-hero {
    background:var(--panel); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px 24px; margin-bottom:16px; display:flex; align-items:center; gap:20px;
  }
  .profile-avatar {
    width:72px; height:72px; border-radius:16px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--bebas); font-size:26px; letter-spacing:2px;
    background:color-mix(in srgb, var(--player-color,var(--red)) 15%, var(--panel2));
    border:2px solid color-mix(in srgb, var(--player-color,var(--red)) 35%, transparent);
    color:var(--player-color,var(--red));
  }
  .profile-info { flex:1; min-width:0; }
  .profile-name { font-family:var(--bebas); font-size:26px; letter-spacing:2px; line-height:1; }
  .profile-sub  { font-size:12px; color:var(--text2); margin-top:4px; }
  .profile-dorsal {
    font-family:var(--bebas); font-size:42px; letter-spacing:2px; line-height:1;
    color:color-mix(in srgb, var(--player-color,var(--red)) 40%, var(--border2));
    flex-shrink:0;
  }

  .prof-metrics { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:20px; }
  .prof-tile { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:14px 10px 12px; text-align:center; }
  .prof-val { font-family:var(--bebas); font-size:26px; letter-spacing:1px; line-height:1; color:var(--text); }
  .prof-lbl { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted); margin-top:4px; }

  /* ─── CHARTS PERFIL ─── */
  .prof-charts { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
  .prof-chart-card { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; }
  .prof-chart-title { font-family:var(--bebas); font-size:15px; letter-spacing:1.5px; color:var(--text); margin-bottom:2px; }
  .prof-chart-sub   { font-size:10px; color:var(--muted); margin-bottom:12px; }
  .prof-chart-wrap  { position:relative; width:100%; height:160px; }
  .prof-chart-wrap.tall { height:200px; }
  @media(max-width:768px) {
    .prof-charts { grid-template-columns:1fr; }
  }

  .gamelog-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border); margin-bottom:24px; }
  table.gltbl { width:100%; border-collapse:collapse; font-size:13px; }
  table.gltbl thead th { padding:9px 10px; font-size:9px; font-weight:700; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; background:var(--panel2); border-bottom:1px solid var(--border); white-space:nowrap; text-align:right; }
  table.gltbl thead th:first-child, table.gltbl thead th:nth-child(2), table.gltbl thead th:nth-child(3) { text-align:left; }
  table.gltbl tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
  table.gltbl tbody tr:last-child { border-bottom:none; }
  table.gltbl tbody tr:hover { background:var(--panel2); }
  table.gltbl tbody td { padding:10px 10px; color:var(--text2); text-align:right; white-space:nowrap; }
  table.gltbl tbody td:first-child, table.gltbl tbody td:nth-child(2), table.gltbl tbody td:nth-child(3) { text-align:left; }
  .gl-win { color:var(--green); font-weight:700; }
  .gl-loss { color:var(--red); font-weight:700; }
  .gl-hi { color:var(--text); font-weight:700; }
  .gl-pm-pos { color:#4caf50; font-weight:700; }
  .gl-pm-neg { color:#e05555; font-weight:700; }

  @media(max-width:768px) {
    .prof-metrics { grid-template-columns:repeat(3,1fr); }
    .player-profile-hero { flex-wrap:wrap; }
    .profile-dorsal { display:none; }
  }

  /* ─── VISTA JUGADORES ─── */
  .team-header-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 24px;
  }
  .team-header-badge {
    width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--team-color, var(--red)) 15%, var(--panel2));
    border: 2px solid color-mix(in srgb, var(--team-color, var(--red)) 30%, transparent);
    font-family: var(--bebas); font-size: 16px; color: var(--team-color, var(--red));
  }
  .team-header-name { font-family: var(--bebas); font-size: 22px; letter-spacing: 1px; }
  .team-header-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
  }

  .player-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s, transform .15s;
    cursor: default;
  }
  .player-card:hover { border-color: var(--border2); transform: translateY(-2px); }

  .player-photo-wrap {
    width: 100%; aspect-ratio: 1;
    background: var(--panel2);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .player-photo {
    width: 100%; height: 100%;
    object-fit: cover; object-position: top;
    display: none;
  }
  .player-photo.loaded { display: block; }
  .player-initials {
    font-family: var(--bebas);
    font-size: 42px;
    color: var(--border2);
    letter-spacing: 2px;
    user-select: none;
  }
  .player-dorsal-overlay {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.7); border: 1px solid var(--border2);
    border-radius: 6px; padding: 2px 8px;
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    color: var(--text2);
  }
  .player-info {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
  }
  .player-nombre { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .player-apellidos { font-size: 12px; color: var(--text2); margin-top: 1px; line-height: 1.2; }

  /* ─── LOADING ─── */
  .loading { padding:60px; text-align:center; color:var(--muted); font-size:14px; }

  /* ─── MOBILE TOPBAR ─── */
  .mobile-topbar { display:none; padding:14px 18px 10px; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); flex-shrink:0; }
  .mob-logo { font-family:var(--bebas); font-size:22px; letter-spacing:2px; }
  .mob-logo span { color:var(--red); }
  .mob-right { display:flex; align-items:center; gap:10px; }
  .mob-avatar { width:32px; height:32px; border-radius:50%; background:var(--red); display:flex; align-items:center; justify-content:center; font-family:var(--bebas); font-size:12px; color:white; }

  /* ─── BOTTOM NAV ─── */
  .bottom-nav { display:none; height:calc(56px + env(safe-area-inset-bottom)); padding-bottom:env(safe-area-inset-bottom); background:var(--panel); border-top:1px solid var(--border); flex-shrink:0; }
  .bnav-inner { display:flex; height:100%; width:100%; }
  .bnav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; cursor:pointer; text-decoration:none; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
  .bnav-item:active { background:var(--panel2); }
  .bnav-icon { width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
  .bnav-icon svg { width:22px; height:22px; }
  .bnav-item.active .bnav-icon svg { stroke:var(--red); }
  .bnav-item:not(.active) .bnav-icon svg { stroke:var(--muted); }
  .bnav-label { display:none; font-size:11px; text-transform:uppercase; font-family:var(--barlow); font-weight:700; color:var(--muted); line-height:1; }
  .bnav-item.active .bnav-label { color:var(--red); }
  @media (min-width:360px) { .bnav-label { display:block; } .bottom-nav { height:calc(66px + env(safe-area-inset-bottom)); } }

  /* ─── RESPONSIVE ─── */
  @media (max-width:768px) {
    .app { flex-direction:column; }
    .sidebar { display:none; }
    .mobile-topbar { display:flex; width:100%; }
    .bottom-nav { display:flex; width:100%; }
    .topbar { display:none; }
    .content { padding:14px 14px 16px; }
    .teams-grid { grid-template-columns: repeat(2, 1fr); }
    .players-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

          <div class="bnav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>

</div>

<script>
// ─── PALETA DE COLORES POR EQUIPO ──────────────────────────
const TEAM_COLORS = {
  'SAC': '#cc1414',
  'CBN': '#1a6fc4',
  'CLU': '#27ae60',
  'CON': '#8e44ad',
  'RES': '#e67e22',
  'SCD': '#16a085',
  'CBP': '#c0770a',
  'default': '#555555'
};

// Mapa short_name → fichero de imagen (CON usa soller por restricción Windows)
const TEAM_LOGOS = {
  'SAC': '/img/clubes/SAC.jpg',
  'CBN': '/img/clubes/CBN.jpeg',
  'SCD': '/img/clubes/SCD.jpg',
  'CLU': '/img/clubes/CLU.jpg',
  'CBP': '/img/clubes/CBP.png',
  'CON': '/img/clubes/soller.png',
  'RES': '/img/clubes/RES.jpg',
};

function teamColor(shortName) {
  return TEAM_COLORS[shortName] || TEAM_COLORS['default'];
}

function teamLogo(shortName) {
  return TEAM_LOGOS[shortName] || null;
}

function initials(nombre, apellidos) {
  const n = (nombre || '').trim().charAt(0).toUpperCase();
  const a = (apellidos || '').trim().charAt(0).toUpperCase();
  return n + a;
}

// ─── ESTADO ──────────────────────────────────────────────
let allEquipos = [];
let _matchesCache = null;
let _currentTeam  = null; // { id, shortName, nombre }

async function getMatches() {
  if (!_matchesCache) _matchesCache = await fetch('/api/matches').then(r => r.json());
  return _matchesCache;
}

function pct(m, a) { return a ? Math.round(m / a * 100) + '%' : '—'; }
function avg(v, n) { return n ? (v / n).toFixed(1) : '—'; }
function sign(n)   { return n > 0 ? '+' + n : String(n); }

// ─── VISTA EQUIPOS ───────────────────────────────────────
function showTeams() {
  _currentTeam = null;
  _viewLevel   = 0;
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('topbar-breadcrumb').textContent = 'Liga · Temporada 2025–26';
  document.getElementById('topbar-title').textContent = 'Jugadores';
  renderTeams(allEquipos);
}

function teamBadgeHTML(shortName, size = 80) {
  const logo = teamLogo(shortName);
  const color = teamColor(shortName);
  if (logo) {
    return `
      <div class="team-badge-wrap" style="background:none; border-color:color-mix(in srgb,${color} 20%,transparent)">
        <img src="${logo}" alt="${shortName}"
          class="team-badge-img"
          style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;display:block"
          onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="team-badge-letters" style="display:none">${shortName}</span>
      </div>`;
  }
  return `<div class="team-badge-wrap"><span class="team-badge-letters">${shortName}</span></div>`;
}

function renderTeams(equipos) {
  const cards = equipos.map(e => {
    const color = teamColor(e.short_name);
    const isSac = e.short_name === 'SAC';
    return `
      <div class="team-card" style="--team-color:${color}" onclick="showPlayers(${e.id}, '${e.short_name}', '${e.nombre}')">
        ${isSac ? '<div class="team-sac-pill">Mi equipo</div>' : ''}
        ${teamBadgeHTML(e.short_name, 64)}
        <div class="team-name">${e.nombre}</div>
        <div class="team-count">${e.num_jugadores} jugador${e.num_jugadores != 1 ? 'es' : ''}</div>
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="section-title">Equipos de la liga</div>
    <div class="section-sub">Selecciona un equipo para ver su plantilla</div>
    <div class="teams-grid">${cards}</div>
  `;
}

// ─── VISTA JUGADORES ─────────────────────────────────────
async function showPlayers(equipoId, shortName, nombre) {
  _currentTeam = { id: equipoId, shortName, nombre };
  _viewLevel   = 1;
  const color  = teamColor(shortName);

  document.getElementById('back-btn').classList.add('visible');
  document.getElementById('topbar-breadcrumb').textContent = 'Equipos · Temporada 2025–26';
  document.getElementById('topbar-title').textContent = nombre;
  document.getElementById('content').innerHTML = '<div class="loading">Cargando jugadores…</div>';

  try {
    const jugadores = await fetch(`/api/jugadores?equipo_id=${equipoId}`).then(r => r.json());

    const cards = jugadores.map(j => {
      const ini = initials(j.nombre, j.apellidos);
      const jData = encodeURIComponent(JSON.stringify({ nombre: j.nombre, apellidos: j.apellidos, dorsal: j.dorsal }));
      return `
        <div class="player-card" style="cursor:pointer" onclick='showPlayer(${JSON.stringify(j)}, "${shortName}", "${nombre}")'>
          <div class="player-photo-wrap">
            <div class="player-initials">${ini}</div>
            <div class="player-dorsal-overlay">#${j.dorsal ?? '—'}</div>
          </div>
          <div class="player-info">
            <div class="player-nombre">${j.nombre}</div>
            <div class="player-apellidos">${j.apellidos}</div>
          </div>
        </div>`;
    }).join('');

    const logo = teamLogo(shortName);
    const headerBadge = logo
      ? `<img src="${logo}" alt="${shortName}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid color-mix(in srgb,${color} 30%,transparent)" onerror="this.outerHTML='<div class=team-header-badge>${shortName}</div>'">`
      : `<div class="team-header-badge">${shortName}</div>`;

    document.getElementById('content').innerHTML = `
      <div class="team-header-bar" style="--team-color:${color}">
        ${headerBadge}
        <div>
          <div class="team-header-name">${nombre}</div>
          <div class="team-header-meta">${jugadores.length} jugadores registrados · toca un jugador para ver su perfil</div>
        </div>
      </div>
      <div class="players-grid">${cards || '<div class="loading">Sin jugadores registrados</div>'}</div>
    `;
  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="loading">Error: ${err.message}</div>`;
  }
}

// ─── VISTA PERFIL JUGADOR ────────────────────────────────
async function showPlayer(jugador, shortName, teamNombre) {
  _viewLevel   = 2;
  const color  = teamColor(shortName);
  const ini    = initials(jugador.nombre, jugador.apellidos);
  const fullName = (jugador.nombre + ' ' + (jugador.apellidos || '')).trim().toLowerCase();

  document.getElementById('back-btn').classList.add('visible');
  document.getElementById('topbar-breadcrumb').textContent = teamNombre + ' · Temporada 2025–26';
  document.getElementById('topbar-title').textContent = jugador.nombre + ' ' + (jugador.apellidos || '');
  document.getElementById('content').innerHTML = '<div class="loading">Cargando estadísticas…</div>';

  try {
    const data    = await getMatches();
    const partidos = data.partidos || [];

    // Acumular stats del jugador buscando por dorsal en su equipo
    const stats = { pj:0, min:0, pts:0, t1m:0,t1a:0, t2m:0,t2a:0, t3m:0,t3a:0, pf:0, to:0, pm:0, pir:0 };
    const games  = [];

    for (const p of partidos) {
      const teamPlayers = (p.players || {})[shortName];
      if (!teamPlayers) continue;

      // Buscar por dorsal primero, luego por nombre como fallback
      let pl = teamPlayers.find(x => String(x.dorsal) === String(jugador.dorsal));
      if (!pl) pl = teamPlayers.find(x => x.name.toLowerCase() === fullName);
      if (!pl) continue;

      // Determinar rival
      const isCasa  = p.local.shortName  === shortName;
      const rival   = isCasa ? p.visit.nombre : p.local.nombre;
      const sacPts  = isCasa ? p.local.puntos  : p.visit.puntos;
      const rivPts  = isCasa ? p.visit.puntos  : p.local.puntos;
      const result  = sacPts > rivPts ? 'V' : 'D';

      const [t1m,t1a] = (pl.t1||'0/0').split('/').map(Number);
      const [t2m,t2a] = (pl.t2||'0/0').split('/').map(Number);
      const [t3m,t3a] = (pl.t3||'0/0').split('/').map(Number);

      stats.pj++;
      stats.min += pl.min||0; stats.pts += pl.pts||0;
      stats.t1m += t1m; stats.t1a += t1a;
      stats.t2m += t2m; stats.t2a += t2a;
      stats.t3m += t3m; stats.t3a += t3a;
      stats.pf  += pl.pf||0;  stats.to  += pl.to||0;
      stats.pm  += pl.pm||0;  stats.pir += pl.pir||0;

      games.push({ jornada: p.jornada, rival, result, sacPts, rivPts,
        min: pl.min||0, pts: pl.pts||0,
        t1: pl.t1||'0/0', t2: pl.t2||'0/0', t3: pl.t3||'0/0',
        pf: pl.pf||0, to: pl.to||0, pm: pl.pm||0, pir: pl.pir||0 });
    }
    games.sort((a,b) => a.jornada - b.jornada);

    const pmStr  = sign(stats.pm);
    const pmCls  = stats.pm > 0 ? 'gl-pm-pos' : stats.pm < 0 ? 'gl-pm-neg' : '';

    // Game log rows
    const glRows = games.map(g => {
      const pmG    = sign(g.pm);
      const pmGCls = g.pm > 0 ? 'gl-pm-pos' : g.pm < 0 ? 'gl-pm-neg' : '';
      return `<tr>
        <td>J${g.jornada}</td>
        <td>${g.rival}</td>
        <td class="${g.result==='V'?'gl-win':'gl-loss'}">${g.result} ${g.sacPts}–${g.rivPts}</td>
        <td>${g.min}'</td>
        <td class="${g.pts>=15?'gl-hi':''}">${g.pts}</td>
        <td>${g.t2}</td>
        <td>${g.t3}</td>
        <td>${g.t1}</td>
        <td>${g.pf}</td>
        <td>${g.to}</td>
        <td class="${pmGCls}">${pmG}</td>
        <td class="${g.pir>10?'gl-hi':''}">${g.pir}</td>
      </tr>`;
    }).join('');

    const noStats = stats.pj === 0
      ? `<div class="loading" style="padding:40px">Sin partidos registrados este jugador</div>`
      : '';

    document.getElementById('content').innerHTML = `
      <div class="player-profile-hero" style="--player-color:${color}">
        <div class="profile-avatar">${ini}</div>
        <div class="profile-info">
          <div class="profile-name">${jugador.nombre} ${jugador.apellidos||''}</div>
          <div class="profile-sub">${teamNombre} · ${stats.pj} partido${stats.pj!==1?'s':''} jugado${stats.pj!==1?'s':''}</div>
        </div>
        <div class="profile-dorsal">#${jugador.dorsal??'—'}</div>
      </div>

      ${stats.pj > 0 ? `
      <!-- CHARTS -->
      <div class="prof-charts">
        <div class="prof-chart-card">
          <div class="prof-chart-title">Puntos por partido</div>
          <div class="prof-chart-sub">Verde = victoria · Rojo = derrota</div>
          <div class="prof-chart-wrap"><canvas id="chart-pts"></canvas></div>
        </div>
        <div class="prof-chart-card">
          <div class="prof-chart-title">Distribución de puntos</div>
          <div class="prof-chart-sub">T1 · T2 · Triples</div>
          <div class="prof-chart-wrap"><canvas id="chart-dist"></canvas></div>
        </div>
        <div class="prof-chart-card">
          <div class="prof-chart-title">Radar de perfil</div>
          <div class="prof-chart-sub">Normalizado respecto a referencia de liga</div>
          <div class="prof-chart-wrap tall"><canvas id="chart-radar"></canvas></div>
        </div>
        <div class="prof-chart-card">
          <div class="prof-chart-title">Tendencia PIR</div>
          <div class="prof-chart-sub">Valoración partido a partido</div>
          <div class="prof-chart-wrap"><canvas id="chart-pir"></canvas></div>
        </div>
      </div>

      <div class="prof-metrics">
        <div class="prof-tile"><div class="prof-val">${avg(stats.pts, stats.pj)}</div><div class="prof-lbl">PTS</div></div>
        <div class="prof-tile"><div class="prof-val">${avg(stats.min, stats.pj)}'</div><div class="prof-lbl">MIN</div></div>
        <div class="prof-tile"><div class="prof-val">${pct(stats.t2m, stats.t2a)}</div><div class="prof-lbl">%T2</div></div>
        <div class="prof-tile"><div class="prof-val">${pct(stats.t3m, stats.t3a)}</div><div class="prof-lbl">%T3</div></div>
        <div class="prof-tile"><div class="prof-val">${pct(stats.t1m, stats.t1a)}</div><div class="prof-lbl">%TL</div></div>
        <div class="prof-tile"><div class="prof-val">${avg(stats.t3m, stats.pj)}</div><div class="prof-lbl">3PT</div></div>
        <div class="prof-tile"><div class="prof-val">${avg(stats.pf, stats.pj)}</div><div class="prof-lbl">Faltas</div></div>
        <div class="prof-tile"><div class="prof-val">${avg(stats.to, stats.pj)}</div><div class="prof-lbl">TO</div></div>
        <div class="prof-tile"><div class="prof-val ${pmCls}">${pmStr}</div><div class="prof-lbl">±</div></div>
        <div class="prof-tile"><div class="prof-val">${avg(stats.pir, stats.pj)}</div><div class="prof-lbl">PIR</div></div>
      </div>

      <div class="section-hdr" style="margin-bottom:12px">
        <div class="section-title" style="font-size:16px;letter-spacing:1.5px">Registro de partidos</div>
      </div>
      <div class="gamelog-wrap">
        <table class="gltbl">
          <thead><tr>
            <th>J</th><th>Rival</th><th>Res</th>
            <th>MIN</th><th>PTS</th><th>T2</th><th>T3</th><th>TL</th>
            <th>PF</th><th>TO</th><th>±</th><th>PIR</th>
          </tr></thead>
          <tbody>${glRows}</tbody>
        </table>
      </div>` : noStats}
    `;
    // Dibujar charts tras renderizar el DOM
    if (stats.pj > 0) renderProfCharts(games, stats, color);
  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="loading">Error: ${err.message}</div>`;
  }
}

// ─── CHART HELPERS ───────────────────────────────────────
let _profCharts = [];
function destroyProfCharts() {
  _profCharts.forEach(c => c.destroy());
  _profCharts = [];
}
function mkProfChart(id, cfg) {
  const el = document.getElementById(id);
  if (!el) return;
  const c = new Chart(el, cfg);
  _profCharts.push(c);
}

const CHART_BASE = {
  responsive: true, maintainAspectRatio: false,
  plugins: {
    legend: { display: false },
    tooltip: { backgroundColor:'#1e1e1e', borderColor:'#333', borderWidth:1, titleColor:'#aaa', bodyColor:'#fff' }
  },
  scales: {
    x: { ticks:{color:'#555',font:{size:10}}, grid:{color:'rgba(255,255,255,0.04)'}, border:{color:'#2a2a2a'} },
    y: { ticks:{color:'#555',font:{size:10}}, grid:{color:'rgba(255,255,255,0.04)'}, border:{color:'#2a2a2a'} }
  }
};

function renderProfCharts(games, stats, color) {
  destroyProfCharts();

  const labels  = games.map(g => `J${g.jornada}`);
  const winColor = 'rgba(39,174,96,0.8)', lossColor = 'rgba(204,20,20,0.8)';
  const winBorder= '#27ae60', lossBorder = '#cc1414';

  // 1. Puntos por partido
  mkProfChart('chart-pts', {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: games.map(g => g.pts),
        backgroundColor: games.map(g => g.result==='V' ? winColor : lossColor),
        borderColor:     games.map(g => g.result==='V' ? winBorder : lossBorder),
        borderWidth: 1, borderRadius: 4
      }]
    },
    options: {
      ...CHART_BASE,
      plugins: { ...CHART_BASE.plugins, tooltip: { ...CHART_BASE.plugins.tooltip,
        callbacks: { label: ctx => ` ${games[ctx.dataIndex].result} vs ${games[ctx.dataIndex].rival}  ${ctx.raw} pts` }
      }}
    }
  });

  // 2. Distribución de puntos (donut)
  const ptT1 = stats.t1m * 1;
  const ptT2 = stats.t2m * 2;
  const ptT3 = stats.t3m * 3;
  const totalPts = ptT1 + ptT2 + ptT3 || 1;
  mkProfChart('chart-dist', {
    type: 'doughnut',
    data: {
      labels: ['Tiros libres', 'Tiros de 2', 'Triples'],
      datasets: [{
        data: [ptT1, ptT2, ptT3],
        backgroundColor: ['rgba(255,213,79,0.8)','rgba(204,20,20,0.8)','rgba(100,181,246,0.8)'],
        borderColor:     ['#ffd54f','#cc1414','#64b5f6'],
        borderWidth: 2, hoverOffset: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position:'right', labels:{ color:'#888', font:{size:11}, boxWidth:12, padding:10 } },
        tooltip: { ...CHART_BASE.plugins.tooltip,
          callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} pts (${Math.round(ctx.raw/totalPts*100)}%)` }
        }
      }
    }
  });

  // 3. Radar de perfil
  // Normalizamos respecto a referencias de liga amateur
  const refs = { pts: 15, t3: 2, pctT2: 60, pctT3: 40, pctTL: 80, pir: 15 };
  const radarData = [
    Math.min(100, (stats.pj ? stats.pts/stats.pj : 0) / refs.pts  * 100),
    Math.min(100, (stats.pj ? stats.t3m/stats.pj : 0) / refs.t3   * 100),
    Math.min(100, (stats.t2a ? stats.t2m/stats.t2a*100 : 0) / refs.pctT2 * 100),
    Math.min(100, (stats.t3a ? stats.t3m/stats.t3a*100 : 0) / refs.pctT3 * 100),
    Math.min(100, (stats.t1a ? stats.t1m/stats.t1a*100 : 0) / refs.pctTL * 100),
    Math.min(100, (stats.pj ? stats.pir/stats.pj : 0)  / refs.pir * 100),
  ];
  const hexAlpha = (hex, a) => hex + Math.round(a*255).toString(16).padStart(2,'0');
  mkProfChart('chart-radar', {
    type: 'radar',
    data: {
      labels: ['Anotación','Triples','%T2','%T3','%TL','PIR'],
      datasets: [{
        data: radarData,
        backgroundColor: hexAlpha(color, 0.15),
        borderColor: color, borderWidth: 2,
        pointBackgroundColor: color, pointRadius: 3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend:{display:false}, tooltip:{ ...CHART_BASE.plugins.tooltip,
        callbacks:{ label: ctx => ` ${Math.round(ctx.raw)}%` }
      }},
      scales: { r: {
        min:0, max:100,
        ticks:{ display:false, stepSize:25 },
        grid:{ color:'rgba(255,255,255,0.07)' },
        angleLines:{ color:'rgba(255,255,255,0.07)' },
        pointLabels:{ color:'#888', font:{size:11} }
      }}
    }
  });

  // 4. PIR por partido (línea)
  mkProfChart('chart-pir', {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: games.map(g => g.pir),
        borderColor: color, backgroundColor: hexAlpha(color, 0.12),
        borderWidth: 2, pointRadius: 4, pointBackgroundColor: color,
        tension: 0.3, fill: true
      }]
    },
    options: {
      ...CHART_BASE,
      plugins: { ...CHART_BASE.plugins, tooltip: { ...CHART_BASE.plugins.tooltip,
        callbacks: { label: ctx => ` PIR ${ctx.raw}  vs ${games[ctx.dataIndex].rival}` }
      }},
      scales: {
        x: CHART_BASE.scales.x,
        y: { ...CHART_BASE.scales.y, beginAtZero: true }
      }
    }
  });
}

// ─── BACK ────────────────────────────────────────────────
// 0 = equipos  |  1 = jugadores del equipo  |  2 = perfil jugador
let _viewLevel = 0;

function handleBack() {
  destroyProfCharts();
  if (_viewLevel === 2) {
    showPlayers(_currentTeam.id, _currentTeam.shortName, _currentTeam.nombre);
  } else {
    showTeams();
  }
}

// ─── INIT ─────────────────────────────────────────────────
async function init() {
  try {
    allEquipos = await fetch('/api/equipos').then(r => r.json());
    // SAC primero
    allEquipos.sort((a, b) => {
      if (a.short_name === 'SAC') return -1;
      if (b.short_name === 'SAC') return 1;
      return a.nombre.localeCompare(b.nombre);
    });
    renderTeams(allEquipos);
  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="loading">Error: ${err.message}</div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
