<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>HoopStats · Editor de Ejercicio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:#cc1414; --red-dim:#991010;
  --bg:#111111; --panel:#1a1a1a; --panel2:#222222; --panel3:#2a2a2a;
  --border:#2e2e2e; --border2:#3a3a3a;
  --text:#f0f0f0; --text2:#aaaaaa; --muted:#666666;
  --off:#2980b9; --def:#c0392b;
  --c-move:rgba(255,255,255,0.88); --c-pass:#5dccf5; --c-screen:#ffd54f;
  --bebas:'Bebas Neue',sans-serif; --barlow:'Barlow Condensed',sans-serif;
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--barlow); overflow: hidden;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
}
.app { display: flex; flex-direction: column; height: 100dvh; }

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  padding-top: calc(10px + env(safe-area-inset-top));
  border-bottom: 1px solid var(--border);
  background: var(--panel); flex-shrink: 0;
}
.btn-back {
  display: flex; align-items: center; gap: 5px;
  color: var(--text2); font-size: 13px; font-weight: 600;
  text-decoration: none; padding: 6px 10px;
  border: 1px solid var(--border); border-radius: 6px;
  background: none; cursor: pointer; font-family: var(--barlow);
  transition: color .15s, border-color .15s; white-space: nowrap;
}
.btn-back svg { width: 14px; height: 14px; }
.btn-back:hover { color: var(--text); border-color: var(--border2); }
.topbar-title { flex: 1; font-family: var(--bebas); font-size: 20px; letter-spacing: 2px; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.btn-icon {
  display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px; flex-shrink: 0;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--panel2); color: var(--text2); cursor: pointer;
  font-family: var(--barlow); transition: all .12s;
}
.btn-icon svg { width: 15px; height: 15px; }
.btn-icon:hover { color: var(--text); border-color: var(--border2); }
.btn-icon.danger:hover { color: #e74c3c; border-color: rgba(231,76,60,.4); background: rgba(231,76,60,.08); }
.btn-save {
  display: flex; align-items: center; gap: 5px; flex-shrink: 0;
  padding: 6px 12px; background: var(--red); border: none;
  border-radius: 6px; color: #fff; font-size: 13px; font-weight: 700;
  font-family: var(--barlow); letter-spacing: .5px; cursor: pointer;
  transition: background .15s; white-space: nowrap;
}
.btn-save:hover { background: var(--red-dim); }
.btn-save svg { width: 13px; height: 13px; }

/* ── TOOL BAR ── */
.tool-bar {
  display: flex; align-items: center; gap: 4px;
  padding: 7px 12px; border-bottom: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0;
  overflow-x: auto; scrollbar-width: none;
}
.tool-bar::-webkit-scrollbar { display: none; }
.tl {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 11px; border-radius: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase;
  border: 1.5px solid var(--border); background: var(--panel);
  color: var(--muted); cursor: pointer; font-family: var(--barlow);
  transition: all .12s; white-space: nowrap; flex-shrink: 0;
}
.tl svg { width: 13px; height: 13px; }
.tl:hover { color: var(--text); border-color: var(--border2); }
.tl.active { color: var(--text); border-color: #555; background: var(--panel2); }
.tl.active.move  { border-color: rgba(255,255,255,.4); color: var(--c-move); }
.tl.active.pass  { border-color: rgba(93,204,245,.5); color: var(--c-pass); }
.tl.active.scr   { border-color: rgba(255,213,79,.5); color: var(--c-screen); }

.tl-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; margin: 0 2px; }

.tl.anim { background: rgba(39,174,96,.12); border-color: rgba(39,174,96,.35); color: #4caf50; }
.tl.anim:hover { background: rgba(39,174,96,.22); }
.tl.anim:disabled { opacity: .5; cursor: default; }
.tl.reset-btn { color: var(--text2); }

/* ── COURT ── */
.court-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 12px; min-height: 0; overflow: hidden; background: var(--bg);
}
.court-wrap {
  position: relative; width: 100%; max-width: 460px;
}
.court-wrap.mode-arrow { cursor: crosshair; }

.court-bg { display: block; width: 100%; height: auto; border-radius: 10px; pointer-events: none; }

/* Arrow SVG: sits between bg and items; CSS pointer-events:none but children can override */
.arrow-svg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  overflow: visible; pointer-events: none; border-radius: 10px;
  z-index: 1;
}

/* Items overlay */
.overlay {
  position: absolute; inset: 0; border-radius: 10px;
  overflow: visible; z-index: 2;
}

/* ── PLACED ITEMS ── */
.ci {
  position: absolute; transform: translate(-50%,-50%);
  cursor: grab; touch-action: none; z-index: 2;
  transition: filter .1s;
}
.ci:active { cursor: grabbing; }
.ci.selected { z-index: 10; filter: drop-shadow(0 0 5px rgba(255,255,255,.5)); }
.ci.dragging { opacity: .85; z-index: 20; transition: none; }
.ci.animating { transition: none; cursor: default; pointer-events: none; }

/* Shapes */
.sh-player {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--bebas); font-size: 13px; letter-spacing: .5px;
  border: 2px solid rgba(255,255,255,.22);
  box-shadow: 0 2px 6px rgba(0,0,0,.6);
  position: relative;
}
/* Balón pegado al jugador */
.ball-dot {
  position: absolute; bottom: -5px; right: -5px;
  width: 13px; height: 13px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #f0a040, #b84800);
  border: 2px solid var(--bg);
  box-shadow: 0 1px 4px rgba(0,0,0,.7);
  pointer-events: none;
}
.sh-cone {
  width: 0; height: 0;
  border-left: 13px solid transparent; border-right: 13px solid transparent;
  border-bottom: 22px solid #e67e22;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.5));
}
.sh-chair {
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  font-size: 22px; line-height: 1; filter: drop-shadow(0 1px 3px rgba(0,0,0,.7));
}
.sh-bench {
  position: relative; width: 52px; height: 13px;
  background: #6d4c41; border-radius: 3px; border: 2px solid #8d6e63;
  box-shadow: 0 2px 5px rgba(0,0,0,.6);
}
.sh-bench::before, .sh-bench::after {
  content: ''; position: absolute; width: 5px; height: 9px;
  background: #4e342e; border-radius: 0 0 2px 2px; bottom: -9px;
}
.sh-bench::before { left: 7px; }
.sh-bench::after  { right: 7px; }
.sh-ball {
  width: 28px; height: 28px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #f0a040, #b84800);
  border: 1.5px solid #803000; box-shadow: 0 2px 5px rgba(0,0,0,.6);
  position: relative; overflow: hidden;
}
.sh-ball::before {
  content: ''; position: absolute; width: 150%; height: 150%;
  top: -25%; left: -25%; border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,.3);
}
.sh-ball::after {
  content: ''; position: absolute; width: 28px; height: 28px;
  top: 0; left: -14px; border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,.3);
}
.ci.selected::after {
  content: '✕'; position: absolute; top: -8px; right: -8px;
  width: 16px; height: 16px; background: #e74c3c; color: #fff;
  border-radius: 50%; font-size: 9px; line-height: 16px; text-align: center;
  font-weight: 700; z-index: 5; pointer-events: none;
}

/* Dot indicator at arrow start when drawing */
#start-dot {
  position: absolute; width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,.7); transform: translate(-50%,-50%);
  pointer-events: none; z-index: 15; display: none;
}

/* ── SEL BAR ── */
.sel-bar {
  display: none; align-items: center; gap: 8px;
  padding: 7px 14px; background: var(--panel2);
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.sel-bar.show { display: flex; }
/* Botón "Dar balón" */
.btn-ball {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px;
  background: rgba(230,126,34,.12); border: 1px solid rgba(230,126,34,.35);
  border-radius: 5px; color: #e67e22; font-size: 11px; font-weight: 700;
  font-family: var(--barlow); cursor: pointer; letter-spacing: .5px;
  transition: background .12s; white-space: nowrap;
}
.btn-ball:hover { background: rgba(230,126,34,.22); }
.btn-ball.has-ball {
  background: rgba(230,126,34,.22); border-color: rgba(230,126,34,.6); color: #f39c12;
}
.sel-name { font-size: 12px; font-weight: 600; color: var(--text2); flex: 1; }
.btn-del {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; background: rgba(231,76,60,.12);
  border: 1px solid rgba(231,76,60,.3); border-radius: 5px;
  color: #e74c3c; font-size: 11px; font-weight: 700;
  font-family: var(--barlow); cursor: pointer; letter-spacing: .5px;
  transition: background .12s;
}
.btn-del:hover { background: rgba(231,76,60,.22); }
.btn-del svg { width: 12px; height: 12px; }

/* ── SLIDE STRIP ── */
.slide-strip-wrap {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-top: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0;
}
.slide-strip-label {
  font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); white-space: nowrap; flex-shrink: 0;
  writing-mode: horizontal-tb;
}
.slide-strip {
  display: flex; gap: 6px; align-items: center;
  overflow-x: auto; scrollbar-width: none; flex: 1;
}
.slide-strip::-webkit-scrollbar { display: none; }

.slide-thumb {
  width: 72px; height: 50px; border-radius: 6px;
  border: 2px solid var(--border); cursor: pointer;
  position: relative; flex-shrink: 0; overflow: hidden;
  transition: border-color .15s;
}
.slide-thumb:hover { border-color: var(--border2); }
.slide-thumb.active { border-color: var(--red); box-shadow: 0 0 0 1px var(--red); }
.slide-thumb svg { display: block; width: 100%; height: 100%; }
.slide-num {
  position: absolute; bottom: 2px; left: 4px;
  font-size: 9px; font-weight: 700; color: rgba(255,255,255,.55);
  font-family: var(--bebas); letter-spacing: 1px; pointer-events: none; line-height: 1;
}
.slide-del {
  position: absolute; top: 2px; right: 2px;
  width: 15px; height: 15px; border-radius: 50%;
  background: rgba(0,0,0,.55); border: none; color: rgba(255,255,255,.55);
  font-size: 11px; line-height: 1; text-align: center;
  cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
  transition: background .1s; z-index: 5;
}
.slide-del:hover { background: rgba(231,76,60,.8); color: white; }

.slide-add {
  width: 50px; height: 50px; border-radius: 6px;
  border: 2px dashed var(--border); background: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1px; color: var(--muted); flex-shrink: 0;
  transition: border-color .15s, color .15s; font-family: var(--barlow);
}
.slide-add:hover { border-color: rgba(204,20,20,.5); color: var(--red); }
.slide-add .sa-plus { font-size: 20px; line-height: 1; font-weight: 300; }
.slide-add .sa-label { font-size: 7px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; line-height: 1; }

/* ── PALETTE ── */
.palette {
  background: var(--panel); border-top: 1px solid var(--border);
  padding: 8px 12px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));
  flex-shrink: 0;
}
.pal-scroll {
  display: flex; gap: 5px; align-items: center;
  overflow-x: auto; scrollbar-width: none; padding-bottom: 1px;
}
.pal-scroll::-webkit-scrollbar { display: none; }
.pal-sep { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
.pal-lbl { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.pal-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: grab; flex-shrink: 0; touch-action: none;
  padding: 4px 3px; border-radius: 6px; transition: background .12s;
}
.pal-item:hover { background: var(--panel2); }
.pal-item:active { cursor: grabbing; }
.pal-label { font-size: 9px; color: var(--muted); font-family: var(--barlow); font-weight: 600; letter-spacing: .3px; white-space: nowrap; pointer-events: none; }
.pal-item .sh-player { width: 26px; height: 26px; font-size: 11px; pointer-events: none; }
.pal-item .sh-cone   { border-left-width: 11px; border-right-width: 11px; border-bottom-width: 18px; pointer-events: none; }
.pal-item .sh-chair  { width: 26px; height: 26px; font-size: 18px; pointer-events: none; }
.pal-item .sh-bench  { width: 42px; height: 11px; pointer-events: none; }
.pal-item .sh-ball   { width: 24px; height: 24px; pointer-events: none; }

/* ── GHOST ── */
#ghost { position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%) scale(1.1); opacity: .85; display: none; }

/* ── HINT ── */
.court-hint {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none;
}
.court-hint span { font-size: 12px; color: rgba(255,255,255,.2); font-family: var(--barlow); font-weight: 600; letter-spacing: .5px; text-align: center; line-height: 1.7; }

/* ── PALETTE USED ── */
.pal-item.pal-used { opacity: 0.28; cursor: not-allowed; pointer-events: none; }
.pal-item.pal-used:hover { background: none; }

/* ── TEXT ITEM ── */
.sh-text {
  color: #fff; font-family: var(--barlow); font-size: 14px; font-weight: 700;
  white-space: nowrap; text-shadow: 0 1px 5px rgba(0,0,0,.95);
  padding: 2px 6px; background: rgba(0,0,0,.35);
  border-radius: 3px; border: 1px solid rgba(255,255,255,.12);
  pointer-events: none; line-height: 1.4; min-width: 20px; text-align: center;
}

/* Text edit input in sel-bar */
.text-edit-input {
  flex: 1; min-width: 0; background: var(--panel2);
  border: 1px solid var(--border2); border-radius: 5px;
  color: var(--text); font-family: var(--barlow); font-size: 13px;
  padding: 5px 10px; outline: none; font-weight: 600;
}
.text-edit-input:focus { border-color: #555; }
.text-edit-input::placeholder { color: var(--muted); font-weight: 400; }

/* ── SLIDE DESCRIPTION ── */
.slide-desc-row {
  padding: 4px 12px 5px; border-top: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0;
}
.slide-desc-input {
  width: 100%; background: var(--panel);
  border: 1px solid var(--border); border-radius: 5px;
  color: var(--text2); font-family: var(--barlow); font-size: 11px;
  padding: 5px 10px; outline: none; font-weight: 600; letter-spacing: .2px;
  transition: border-color .15s, color .15s;
}
.slide-desc-input:focus { border-color: var(--border2); color: var(--text); }
.slide-desc-input::placeholder { color: var(--muted); font-weight: 400; }

/* ── FULL COURT ── */
.court-wrap.full-court { max-width: 700px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: #27ae60; color: #fff; padding: 9px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 700; font-family: var(--barlow); letter-spacing: .5px;
  opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; z-index: 1000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <a href="ejercicios.html" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver
    </a>
    <div class="topbar-title">Editor de Ejercicio</div>
    <button class="btn-icon" title="Deshacer (Ctrl+Z)" onclick="undoLast()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13C5 8 9 5 14 5a9 9 0 0 1 0 18c-4 0-7-2-9-5"/></svg>
    </button>
    <button class="btn-icon danger" title="Limpiar todo" onclick="clearAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>
    <button class="btn-save" onclick="saveExercise()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Guardar
    </button>
  </div>

  <!-- TOOL BAR -->
  <div class="tool-bar">
    <!-- Mode buttons -->
    <button class="tl active" id="tl-sel" onclick="setMode('select')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3l14 9-7 1-3 7z"/></svg>
      Sel
    </button>
    <button class="tl move" id="tl-move" onclick="setMode('arrow-move')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="13 5 19 5 19 11"/></svg>
      Corte
    </button>
    <button class="tl pass" id="tl-pass" onclick="setMode('arrow-pass')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 2"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="13 5 19 5 19 11"/></svg>
      Pase
    </button>
    <button class="tl scr" id="tl-scr" onclick="setMode('arrow-screen')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="15" y2="9"/><line x1="11" y1="5" x2="19" y2="5"/><line x1="19" y1="5" x2="19" y2="13"/></svg>
      Bloqueo
    </button>

    <button class="tl" id="tl-text" onclick="setMode('place-text')" title="Añadir texto a la pista">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
      Texto
    </button>

    <div class="tl-sep"></div>

    <button class="tl" id="tl-court" onclick="toggleCourt()" title="Cambiar entre media pista y pista completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="1"/><line x1="12" y1="5" x2="12" y2="19"/></svg>
      Pista completa
    </button>

    <div class="tl-sep"></div>

    <!-- Animation -->
    <button class="tl anim" id="btn-play" onclick="playAnim()">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Paso
    </button>
    <button class="tl anim" id="btn-play-all" onclick="playAll()" style="gap:3px;">
      <svg viewBox="0 0 24 24" fill="currentColor" width="11" height="11"><polygon points="5 3 19 12 5 21 5 3"/></svg><svg viewBox="0 0 24 24" fill="currentColor" width="11" height="11"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Todo
    </button>
    <button class="tl reset-btn" id="btn-reset" style="display:none" onclick="resetAnim()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v6h6"/><path d="M3 8C5 4 9 2 14 2a10 10 0 0 1 0 20c-4 0-8-2-10-5"/></svg>
      Reset
    </button>
  </div>

  <!-- COURT -->
  <div class="court-area">
    <div class="court-wrap" id="court-wrap">

      <!-- Background SVG: media pista -->
      <svg id="court-half" class="court-bg" viewBox="0 0 120 84" xmlns="http://www.w3.org/2000/svg" style="background:#0b1622;">
        <rect x="0" y="0" width="120" height="84" fill="#0b1622"/>
        <path d="M4,4 L4,80 L116,80 L116,4" stroke="rgba(255,255,255,.6)" stroke-width="1.5" fill="none"/>
        <line x1="4" y1="4" x2="116" y2="4" stroke="rgba(255,255,255,.28)" stroke-width="1" stroke-dasharray="4 3"/>

      <div class="pal-item" data-type="def" data-num="3"><div class="sh-player" style="background:var(--def);color:#fff;">D3</div><span class="pal-label">Def 3</span></div>
      <div class="pal-item" data-type="def" data-num="4"><div class="sh-player" style="background:var(--def);color:#fff;">D4</div><span class="pal-label">Def 4</span></div>
      <div class="pal-item" data-type="def" data-num="5"><div class="sh-player" style="background:var(--def);color:#fff;">D5</div><span class="pal-label">Def 5</span></div>

      <div class="pal-item" data-type="ball"><div class="sh-ball"></div><span class="pal-label">Pelota</span></div>

      <div class="pal-item" data-type="text" data-num=""><div class="sh-text" style="font-size:11px;padding:1px 5px;">Abc</div><span class="pal-label">Texto</span></div>

<div id="ghost"></div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
let items    = [];   // { id, type, num, x, y }  (x,y = % of court)
let arrows   = [];   // { id, x1,y1, x2,y2, cx,cy, type:'move'|'pass'|'screen' }
let mode     = 'select';
let selId    = null; // selected item id
let selAid   = null; // selected arrow id
let uid      = 0;
let history  = [];   // undo stack  { items, arrows, ballPossessorId }

// Posesión del balón
let ballPossessorId     = null; // id del jugador que tiene el balón
let animBallPossessorId = null; // guarda posesión para reset

// Diapositivas / pasos
let slides           = [];  // [{ id, items, arrows, ballPossessorId }]
let currentSlideIdx  = 0;
let slideUid         = 0;

// Drag state
let drag      = null; // palette or item drag
let arrowDraw = null; // arrow drawing state { x1,y1, snapId }

// Animation
let animating  = false;
let animBase   = null; // snapshot of item positions before anim
let animRAF    = null;
let animPassBalls = []; // temp ball elements during pass animation
const ANIM_MS  = 1500;

// Play-all state
let playAllActive = false;
let playAllReject = null; // abort handle

// Court type
let courtType = 'half'; // 'half' | 'full'

// Court pixel size (updated by ResizeObserver)
let CW = 1, CH = 1;

// ── DOM ───────────────────────────────────────────────────────────────────────
const overlay       = document.getElementById('overlay');
const courtWrap     = document.getElementById('court-wrap');
const arrowSVG      = document.getElementById('arrow-svg');
const selBar        = document.getElementById('sel-bar');
const selNameEl     = document.getElementById('sel-name');
const hint          = document.getElementById('hint');
const ghost         = document.getElementById('ghost');
const startDot      = document.getElementById('start-dot');
const btnPlay       = document.getElementById('btn-play');
const btnPlayAll    = document.getElementById('btn-play-all');
const btnReset      = document.getElementById('btn-reset');
const textEditInput = document.getElementById('text-edit-input');
const slideDescInput= document.getElementById('slide-desc-input');
const courtHalfSVG  = document.getElementById('court-half');
const courtFullSVG  = document.getElementById('court-full');

// ── ResizeObserver ────────────────────────────────────────────────────────────
new ResizeObserver(e => {
  const r = e[0].contentRect;
  CW = r.width; CH = r.height;
  renderArrows();
}).observe(courtWrap);

// ══════════════════════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════════════════════
function clamp(v,a,b) { return Math.max(a, Math.min(b, v)); }
function nextId()      { return ++uid; }

function pctOf(cx, cy) {
  const r = courtWrap.getBoundingClientRect();
  return { x: clamp((cx-r.left)/r.width*100,1,99), y: clamp((cy-r.top)/r.height*100,1,99) };
}
function overCourt(cx, cy) {
  const r = courtWrap.getBoundingClientRect();
  return cx>=r.left && cx<=r.right && cy>=r.top && cy<=r.bottom;
}
function toSVGX(pct) { return pct/100*CW; }
function toSVGY(pct) { return pct/100*CH; }

function snapHistory() {
  history.push({ items: JSON.parse(JSON.stringify(items)), arrows: JSON.parse(JSON.stringify(arrows)), ballPossessorId });
  if (history.length > 50) history.shift();
}

// Auto-curve: control point slightly off the midpoint (perpendicular)
function autoCurve(x1,y1,x2,y2) {
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const dx=x2-x1, dy=y2-y1;
  const len=Math.hypot(dx,dy)||1;
  // 22% perpendicular offset — gives a gentle curve
  return { cx: mx - dy/len*len*0.22, cy: my + dx/len*len*0.22 };
}

// Quadratic bezier at t
function bezier(x1,y1,cx,cy,x2,y2,t) {
  const u=1-t;
  return { x: u*u*x1 + 2*u*t*cx + t*t*x2, y: u*u*y1 + 2*u*t*cy + t*t*y2 };
}

// Nearest player to (px,py) within threshold %
function nearestPlayer(px,py,threshold) {
  let best=null, bd=Infinity;
  items.forEach(i => {
    if(i.type!=='off'&&i.type!=='def') return;
    const d=Math.hypot(i.x-px, i.y-py);
    if(d<threshold && d<bd) { bd=d; best=i; }
  });
  return best;
}

// ══════════════════════════════════════════════════════════════════════════════
// ITEM HTML
// ══════════════════════════════════════════════════════════════════════════════
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function shapeHTML(type, num, hasBall, text) {
  const bd = hasBall ? '<div class="ball-dot"></div>' : '';
  if(type==='off')   return `<div class="sh-player" style="background:#2980b9;color:#fff;">${num}${bd}</div>`;
  if(type==='def')   return `<div class="sh-player" style="background:#c0392b;color:#fff;">D${num}${bd}</div>`;
  if(type==='cone')  return `<div class="sh-cone"></div>`;
  if(type==='chair') return `<div class="sh-chair">🪑</div>`;
  if(type==='bench') return `<div class="sh-bench"></div>`;
  if(type==='ball')  return `<div class="sh-ball"></div>`;
  if(type==='text')  return `<div class="sh-text">${escHtml(text||'Texto')}</div>`;
  return '';
}
function itemLabel(type,num) {
  if(type==='off')   return `Jugador ${num}`;
  if(type==='def')   return `Defensor D${num}`;
  if(type==='cone')  return 'Cono';
  if(type==='chair') return 'Silla';
  if(type==='bench') return 'Banco';
  if(type==='ball')  return 'Pelota';
  if(type==='text')  return 'Texto';
  return 'Elemento';
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER ITEMS
// ══════════════════════════════════════════════════════════════════════════════
function renderItems() {
  hint.style.display = (items.length===0&&arrows.length===0) ? 'flex' : 'none';

  const existing = new Map();
  // Solo elementos con data-id — excluye el balón temporal de pase
  overlay.querySelectorAll('.ci[data-id]').forEach(el => existing.set(Number(el.dataset.id), el));

  // Remove stale
  existing.forEach((el,id) => { if(!items.find(i=>i.id===id)) el.remove(); });

  // Add / update
  items.forEach(item => {
    const hasBall = item.id === ballPossessorId;
    let el = existing.get(item.id);
    if(!el) {
      el = document.createElement('div');
      el.className = 'ci';
      el.dataset.id = item.id;
      if(mode==='select') el.addEventListener('pointerdown', onCIDown, {passive:false});
      overlay.appendChild(el);
    }
    // Always update innerHTML (ball-dot may have changed)
    el.innerHTML = shapeHTML(item.type, item.num, hasBall, item.text);
    el.style.left = item.x + '%';
    el.style.top  = item.y + '%';
    el.classList.toggle('selected', item.id===selId);
    el.classList.toggle('animating', animating);
  });

  // Marcar jugadores ya colocados en la paleta
  document.querySelectorAll('.pal-item[data-type="off"],.pal-item[data-type="def"]').forEach(pi => {
    const used = items.some(i=>i.type===pi.dataset.type && String(i.num)===String(pi.dataset.num));
    pi.classList.toggle('pal-used', used);
  });

  // sel bar
  const btnBall = document.getElementById('btn-ball');
  if(selId!==null) {
    const it = items.find(i=>i.id===selId);
    if(it) {
      selBar.classList.add('show');
      selNameEl.textContent = itemLabel(it.type, it.num);
      const isPlayer = it.type==='off' || it.type==='def';
      const isText   = it.type==='text';
      if(isPlayer) {
        btnBall.style.display = '';
        textEditInput.style.display = 'none';
        const hasBall = it.id === ballPossessorId;
        btnBall.textContent = hasBall ? '🏀 Tiene balón' : '🏀 Dar balón';
        btnBall.classList.toggle('has-ball', hasBall);
      } else if(isText) {
        btnBall.style.display = 'none';
        textEditInput.style.display = '';
        // solo actualizar si no está focused (no interrumpir al escribir)
        if(document.activeElement !== textEditInput)
          textEditInput.value = it.text || 'Texto';
      } else {
        btnBall.style.display = 'none';
        textEditInput.style.display = 'none';
      }
    }
  } else if(selAid===null) {
    selBar.classList.remove('show');
    btnBall.style.display = 'none';
    textEditInput.style.display = 'none';
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER ARROWS
// ══════════════════════════════════════════════════════════════════════════════
function arrowPath(x1,y1,cx,cy,x2,y2) {
  const ax1=toSVGX(x1),ay1=toSVGY(y1),acx=toSVGX(cx),acy=toSVGY(cy),ax2=toSVGX(x2),ay2=toSVGY(y2);
  return `M${ax1},${ay1} Q${acx},${acy} ${ax2},${ay2}`;
}

function renderArrows(ghostData) {
  const W=CW, H=CH;
  if(W<2||H<2) return;

  let html = `<defs>
    <filter id="sel-glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="ah-move" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 11 4, 0 8" fill="rgba(255,255,255,.9)"/>
    </marker>
    <marker id="ah-pass" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polyline points="0 0, 11 4, 0 8" fill="none" stroke="#5dccf5" stroke-width="1.8"/>
    </marker>
  </defs>`;

  arrows.forEach(a => {
    const d    = arrowPath(a.x1,a.y1,a.cx,a.cy,a.x2,a.y2);
    const sel  = a.id===selAid;
    const filt = sel ? ' filter="url(#sel-glow)"' : '';

    if(a.type==='screen') {
      // line to endpoint + perpendicular bar
      const ex=toSVGX(a.x2), ey=toSVGY(a.y2);
      // Tangent at t=1 of bezier
      const t=0.98, p0=bezier(a.x1,a.y1,a.cx,a.cy,a.x2,a.y2,t), p1={x:toSVGX(a.x2),y:toSVGY(a.y2)};
      const tdx=p1.x-toSVGX(p0.x), tdy=p1.y-toSVGY(p0.y);
      const tlen=Math.hypot(tdx,tdy)||1;
      const nx=-tdy/tlen*9, ny=tdx/tlen*9;
      html += `<g${filt}>
        <path d="${d}" stroke="#ffd54f" stroke-width="2.5" fill="none" stroke-linecap="round" pointer-events="none"/>
        <line x1="${ex-nx}" y1="${ey-ny}" x2="${ex+nx}" y2="${ey+ny}" stroke="#ffd54f" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>
        <path d="${d}" stroke="transparent" stroke-width="14" fill="none" pointer-events="stroke" data-aid="${a.id}" style="cursor:pointer"/>
      </g>`;
    } else {
      const stroke = a.type==='pass' ? '#5dccf5' : 'rgba(255,255,255,.88)';
      const dash   = a.type==='pass' ? ' stroke-dasharray="8 5"' : '';
      const marker = a.type==='pass' ? '#ah-pass' : '#ah-move';
      html += `<g${filt}>
        <path d="${d}" stroke="${stroke}" stroke-width="2.3" fill="none" stroke-linecap="round"${dash} marker-end="url(${marker})" pointer-events="none"/>
        <path d="${d}" stroke="transparent" stroke-width="14" fill="none" pointer-events="stroke" data-aid="${a.id}" style="cursor:pointer"/>
      </g>`;
    }
  });

  // Ghost arrow (while drawing)
  if(ghostData) {
    const { x1,y1,x2,y2,type } = ghostData;
    const c = autoCurve(x1,y1,x2,y2);
    const d = arrowPath(x1,y1,c.cx,c.cy,x2,y2);
    html += `<g opacity="0.55" pointer-events="none">`;
    if(type==='screen') {
      const ex=toSVGX(x2), ey=toSVGY(y2);
      const t=0.98, p0=bezier(x1,y1,c.cx,c.cy,x2,y2,t);
      const tdx=ex-toSVGX(p0.x), tdy=ey-toSVGY(p0.y);
      const tlen=Math.hypot(tdx,tdy)||1;
      const nx=-tdy/tlen*9, ny=tdx/tlen*9;
      html += `<path d="${d}" stroke="#ffd54f" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="5 3"/>
               <line x1="${ex-nx}" y1="${ey-ny}" x2="${ex+nx}" y2="${ey+ny}" stroke="#ffd54f" stroke-width="3.5" stroke-linecap="round"/>`;
    } else {
      const stroke = type==='pass' ? '#5dccf5' : 'rgba(255,255,255,.88)';
      const dash   = type==='pass' ? ' stroke-dasharray="8 5"' : '';
      const marker = type==='pass' ? '#ah-pass' : '#ah-move';
      html += `<path d="${d}" stroke="${stroke}" stroke-width="2.3" fill="none" stroke-linecap="round"${dash} marker-end="url(${marker})"/>`;
    }
    html += `</g>`;
  }

  arrowSVG.innerHTML = html;
  hint.style.display = (items.length===0&&arrows.length===0) ? 'flex' : 'none';

  // Attach arrow selection
  arrowSVG.querySelectorAll('[data-aid]').forEach(el => {
    el.addEventListener('pointerdown', onArrowTap, {passive:false});
  });

  // Sel bar for arrow
  if(selAid!==null && selId===null) {
    selBar.classList.add('show');
    const at = arrows.find(a=>a.id===selAid);
    selNameEl.textContent = at ? ({move:'Flecha corte',pass:'Flecha pase',screen:'Bloqueo'}[at.type]||'Flecha') : 'Flecha';
  }
}

function renderAll(ghost) { renderItems(); renderArrows(ghost); }

// ══════════════════════════════════════════════════════════════════════════════
// MODE
// ══════════════════════════════════════════════════════════════════════════════
window.setMode = function(m) {
  mode = m;
  const isArrow = m !== 'select';

  // Overlay pointer events: disabled in arrow mode (so SVG can capture)
  overlay.style.pointerEvents = isArrow ? 'none' : '';

  // Court cursor
  courtWrap.classList.toggle('mode-arrow', isArrow);

  // Rebuild item listeners (need pointerdown only in select mode)
  overlay.querySelectorAll('.ci').forEach(el => {
    el.removeEventListener('pointerdown', onCIDown);
    if(!isArrow) el.addEventListener('pointerdown', onCIDown, {passive:false});
  });

  // Tool button visuals
  ['sel','move','pass','scr','text'].forEach(id => {
    const el = document.getElementById('tl-'+id);
    if(el) el.classList.remove('active');
  });
  const activeId = {select:'sel','arrow-move':'move','arrow-pass':'pass','arrow-screen':'scr','place-text':'text'}[m];
  if(activeId) document.getElementById('tl-'+activeId)?.classList.add('active');

  // In arrow mode, attach pointerdown to arrow SVG for drawing
  arrowSVG.removeEventListener('pointerdown', onArrowSVGDown);
  if(isArrow) {
    arrowSVG.style.pointerEvents = 'all';
    arrowSVG.addEventListener('pointerdown', onArrowSVGDown, {passive:false});
  } else {
    arrowSVG.style.pointerEvents = 'none'; // hit areas still capture via SVG attr
  }

  deselect();
};

// ══════════════════════════════════════════════════════════════════════════════
// PALETTE DRAG
// ══════════════════════════════════════════════════════════════════════════════
document.querySelectorAll('.pal-item').forEach(pi => {
  pi.addEventListener('pointerdown', e => {
    e.preventDefault();
    const type = pi.dataset.type, num = pi.dataset.num||null;

    // Jugadores únicos: bloquear si ya está en el campo
    if((type==='off'||type==='def') && items.some(i=>i.type===type && String(i.num)===String(num))) {
      showToast(`${type==='def'?'Defensor D':'Jugador '}${num} ya está en la pista`);
      return;
    }

    pi.setPointerCapture(e.pointerId);
    ghost.innerHTML = shapeHTML(type, num, false, 'Texto');
    ghost.style.display = 'block';
    ghost.style.left = e.clientX+'px';
    ghost.style.top  = e.clientY+'px';
    drag = { src:'pal', type, num };
    deselect();
  }, {passive:false});
});

// ══════════════════════════════════════════════════════════════════════════════
// ITEM DRAG (select mode)
// ══════════════════════════════════════════════════════════════════════════════
function onCIDown(e) {
  if(mode!=='select') return;
  e.preventDefault(); e.stopPropagation();
  const el = e.currentTarget, id = Number(el.dataset.id);
  const item = items.find(i=>i.id===id); if(!item) return;
  selId=id; selAid=null; renderAll();
  el.setPointerCapture(e.pointerId);
  el.classList.add('dragging');
  drag = { src:'ci', id, sx:e.clientX, sy:e.clientY, ox:item.x, oy:item.y, moved:false };
}

// ══════════════════════════════════════════════════════════════════════════════
// ARROW DRAWING
// ══════════════════════════════════════════════════════════════════════════════
function onArrowSVGDown(e) {
  // Ignore if clicking on an existing arrow's hit area (selection)
  if(e.target.dataset.aid) return;
  e.preventDefault();
  arrowSVG.setPointerCapture(e.pointerId);
  const p = pctOf(e.clientX, e.clientY);
  // Snap to nearest player
  const nearest = nearestPlayer(p.x, p.y, 9);
  const sx = nearest ? nearest.x : p.x;
  const sy = nearest ? nearest.y : p.y;
  arrowDraw = { x1:sx, y1:sy, snapId: nearest?.id||null };
  // Show start dot
  startDot.style.display = 'block';
  startDot.style.left = sx+'%';
  startDot.style.top  = sy+'%';
  deselect();
}

function onArrowTap(e) {
  e.preventDefault(); e.stopPropagation();
  const id = Number(e.currentTarget.dataset.aid);
  selAid = id; selId = null;
  renderAll();
}

// ══════════════════════════════════════════════════════════════════════════════
// GLOBAL POINTER MOVE / UP
// ══════════════════════════════════════════════════════════════════════════════
document.addEventListener('pointermove', e => {
  if(!drag && !arrowDraw) return;

  if(drag?.src==='pal') {
    ghost.style.left=e.clientX+'px'; ghost.style.top=e.clientY+'px';
  }

  if(drag?.src==='ci') {
    const item = items.find(i=>i.id===drag.id); if(!item) return;
    const r = courtWrap.getBoundingClientRect();
    item.x = clamp(drag.ox + (e.clientX-drag.sx)/r.width*100, 1,99);
    item.y = clamp(drag.oy + (e.clientY-drag.sy)/r.height*100, 1,99);
    drag.moved = true;
    const el = overlay.querySelector('[data-id="'+drag.id+'"]');
    if(el) { el.style.left=item.x+'%'; el.style.top=item.y+'%'; }
  }

  if(arrowDraw) {
    const p = pctOf(e.clientX, e.clientY);
    const type = mode.replace('arrow-','');
    renderArrows({ x1:arrowDraw.x1, y1:arrowDraw.y1, x2:p.x, y2:p.y, type });
  }
}, {passive:true});

document.addEventListener('pointerup', e => {
  // Palette drop
  if(drag?.src==='pal') {
    ghost.style.display='none';
    if(overCourt(e.clientX,e.clientY)) {
      snapHistory();
      const p = pctOf(e.clientX,e.clientY);
      const item = {id:nextId(), type:drag.type, num:drag.num, x:p.x, y:p.y};
      if(drag.type==='text') item.text = 'Texto';
      items.push(item); selId=item.id; selAid=null;
      // Si es texto, enfocar el input automáticamente tras render
      if(drag.type==='text') setTimeout(()=>{ textEditInput.focus(); textEditInput.select(); }, 60);
    }
    drag=null; renderAll(); return;
  }

  // Item drag end
  if(drag?.src==='ci') {
    const el = overlay.querySelector('[data-id="'+drag.id+'"]');
    if(el) el.classList.remove('dragging');
    if(drag.moved) snapHistory();
    drag=null; return;
  }

  // Arrow draw end
  if(arrowDraw) {
    startDot.style.display='none';
    const p = pctOf(e.clientX,e.clientY);
    const dist = Math.hypot(p.x-arrowDraw.x1, p.y-arrowDraw.y1);
    if(dist>3) {
      snapHistory();
      const c = autoCurve(arrowDraw.x1,arrowDraw.y1,p.x,p.y);
      const type = mode.replace('arrow-','');
      arrows.push({ id:nextId(), x1:arrowDraw.x1, y1:arrowDraw.y1, x2:p.x, y2:p.y, cx:c.cx, cy:c.cy, type });
    }
    arrowDraw=null; renderAll(); return;
  }
}, {passive:true});

document.addEventListener('pointercancel', () => {
  if(drag?.src==='pal') ghost.style.display='none';
  if(drag?.src==='ci') { const el=overlay.querySelector('[data-id="'+drag.id+'"]'); if(el) el.classList.remove('dragging'); }
  startDot.style.display='none';
  drag=null; arrowDraw=null;
});

// Background tap → deselect
overlay.addEventListener('pointerdown', e => {
  if(e.target===overlay || e.target.closest('.court-hint')) deselect();
}, {passive:true});

courtWrap.addEventListener('pointerdown', e => {
  if(mode==='select' && e.target===courtWrap) deselect();
}, {passive:true});

function deselect() { selId=null; selAid=null; renderAll(); }

// Edición en vivo del texto seleccionado
textEditInput.addEventListener('input', () => {
  if(selId===null) return;
  const it = items.find(i=>i.id===selId);
  if(!it || it.type!=='text') return;
  it.text = textEditInput.value || 'Texto';
  // Actualizar solo el innerHTML del elemento sin re-renderizar todo
  const el = overlay.querySelector('[data-id="'+selId+'"]');
  if(el) el.innerHTML = shapeHTML('text', null, false, it.text);
});
textEditInput.addEventListener('keydown', e => {
  if(e.key==='Enter' || e.key==='Escape') { e.preventDefault(); deselect(); setMode('select'); }
});

// Toggle pista completa / media pista
window.toggleCourt = function() {
  courtType = courtType==='half' ? 'full' : 'half';
  const isFull = courtType==='full';
  courtHalfSVG.style.display = isFull ? 'none' : '';
  courtFullSVG.style.display = isFull ? '' : 'none';
  courtWrap.classList.toggle('full-court', isFull);
  document.getElementById('tl-court').innerHTML =
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="1"/><line x1="12" y1="5" x2="12" y2="19"/></svg>
    ${isFull ? '½ Pista' : 'Pista completa'}`;
  renderSlideStrip(); // refrescar miniaturas con nuevo tipo de pista
};

// ══════════════════════════════════════════════════════════════════════════════
// SLIDES
// ══════════════════════════════════════════════════════════════════════════════
function saveCurrentSlide() {
  if(!slides[currentSlideIdx]) return;
  slides[currentSlideIdx] = {
    id: slides[currentSlideIdx].id,
    items: JSON.parse(JSON.stringify(items)),
    arrows: JSON.parse(JSON.stringify(arrows)),
    ballPossessorId,
    description: slideDescInput.value || ''
  };
}

function loadSlide(idx, skipSave) {
  if(idx < 0 || idx >= slides.length) return;
  if(!skipSave) saveCurrentSlide();
  currentSlideIdx = idx;
  const s = slides[idx];
  items           = JSON.parse(JSON.stringify(s.items));
  arrows          = JSON.parse(JSON.stringify(s.arrows));
  ballPossessorId = s.ballPossessorId;
  slideDescInput.value = s.description || '';
  selId = null; selAid = null;
  renderAll();
  renderSlideStrip();
}

window.addSlide = function() {
  saveCurrentSlide();
  const newSlide = {
    id: ++slideUid,
    items: JSON.parse(JSON.stringify(items)),
    arrows: [],
    ballPossessorId,
    description: ''
  };
  slides.push(newSlide);
  currentSlideIdx = slides.length - 1;
  arrows = []; selId = null; selAid = null;
  slideDescInput.value = '';
  renderAll();
  renderSlideStrip();
  showToast('Paso ' + slides.length + ' añadido');
};

window.deleteSlide = function(idx) {
  if(slides.length <= 1) { showToast('Debe haber al menos un paso'); return; }
  slides.splice(idx, 1);
  currentSlideIdx = Math.min(currentSlideIdx, slides.length - 1);
  const s = slides[currentSlideIdx];
  items = JSON.parse(JSON.stringify(s.items));
  arrows = JSON.parse(JSON.stringify(s.arrows));
  ballPossessorId = s.ballPossessorId;
  slideDescInput.value = s.description || '';
  selId = null; selAid = null;
  renderAll();
  renderSlideStrip();
};

function buildThumbSVG(s, ct) {
  const isFull = ct === 'full';
  const vbW    = isFull ? 168 : 120;
  const sx     = vbW / 100;   // scale x: % → SVG coords
  const sy     = 0.84;        // scale y: % → SVG coords (84/100)

  // Líneas de pista
  const courtLines = isFull
    ? `<rect x="4" y="4" width="160" height="76" stroke="rgba(255,255,255,.25)" stroke-width=".8" fill="none"/>
       <line x1="84" y1="4" x2="84" y2="80" stroke="rgba(255,255,255,.2)" stroke-width=".5"/>
       <circle cx="84" cy="42" r="8" stroke="rgba(255,255,255,.18)" stroke-width=".5" fill="none"/>
       <rect x="4" y="24" width="30" height="36" stroke="rgba(255,255,255,.2)" stroke-width=".5" fill="none"/>
       <rect x="134" y="24" width="30" height="36" stroke="rgba(255,255,255,.2)" stroke-width=".5" fill="none"/>
       <path d="M17,11 A31,31 0 0,1 17,73" stroke="rgba(255,255,255,.2)" stroke-width=".5" fill="none"/>
       <path d="M151,11 A31,31 0 0,0 151,73" stroke="rgba(255,255,255,.2)" stroke-width=".5" fill="none"/>`
    : `<path d="M4,4 L4,80 L116,80 L116,4" stroke="rgba(255,255,255,.3)" stroke-width="1" fill="none"/>
       <line x1="50" y1="77" x2="70" y2="77" stroke="rgba(255,255,255,.45)" stroke-width="1.2" stroke-linecap="round"/>
       <circle cx="60" cy="73" r="3.5" stroke="rgba(255,255,255,.35)" stroke-width=".8" fill="none"/>
       <rect x="42" y="48" width="36" height="32" stroke="rgba(255,255,255,.25)" stroke-width=".8" fill="none"/>
       <path d="M22,68 A38,38 0 0,1 98,68" stroke="rgba(255,255,255,.25)" stroke-width=".8" fill="none"/>`;

  // Flechas
  let arrowLines = '';
  (s.arrows||[]).forEach(a => {
    const stroke = a.type==='pass' ? '#5dccf5' : a.type==='screen' ? '#ffd54f' : 'rgba(255,255,255,.7)';
    const dash   = a.type==='pass' ? ' stroke-dasharray="2 1.5"' : '';
    arrowLines += `<path d="M${a.x1*sx},${a.y1*sy} Q${a.cx*sx},${a.cy*sy} ${a.x2*sx},${a.y2*sy}" stroke="${stroke}" stroke-width=".8" fill="none"${dash}/>`;
    if(a.type==='screen') {
      const dx=a.x2-a.x1, dy=a.y2-a.y1, len=Math.hypot(dx,dy)||1;
      const nx=-dy/len*4, ny=dx/len*4;
      arrowLines += `<line x1="${(a.x2+nx)*sx}" y1="${(a.y2+ny)*sy}" x2="${(a.x2-nx)*sx}" y2="${(a.y2-ny)*sy}" stroke="#ffd54f" stroke-width="1.5" stroke-linecap="round"/>`;
    }
  });

  // Jugadores / objetos / texto
  let dots = '';
  (s.items||[]).forEach(item => {
    const cx = item.x*sx, cy = item.y*sy;
    if(item.type==='off') {
      dots += `<circle cx="${cx}" cy="${cy}" r="4" fill="#2980b9" stroke="rgba(255,255,255,.3)" stroke-width=".5"/>
               <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="3.8" fill="white" font-family="sans-serif" font-weight="bold">${item.num}</text>`;
    } else if(item.type==='def') {
      dots += `<circle cx="${cx}" cy="${cy}" r="4" fill="#c0392b" stroke="rgba(255,255,255,.3)" stroke-width=".5"/>
               <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="3" fill="white" font-family="sans-serif" font-weight="bold">D${item.num}</text>`;
    } else if(item.type==='cone') {
      dots += `<polygon points="${cx},${cy-3.5} ${cx-3},${cy+2.5} ${cx+3},${cy+2.5}" fill="#e67e22"/>`;
    } else if(item.type==='ball') {
      dots += `<circle cx="${cx}" cy="${cy}" r="3" fill="#e67e22"/>`;
    } else if(item.type==='text') {
      const t = escHtml((item.text||'').substring(0,8));
      dots += `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="3.5" fill="rgba(255,255,255,.75)" font-family="sans-serif" font-weight="bold">${t}</text>`;
    }
    if(item.id === s.ballPossessorId) {
      dots += `<circle cx="${cx+3.5}" cy="${cy+3.5}" r="2.2" fill="#e67e22" stroke="rgba(0,0,0,.4)" stroke-width=".5"/>`;
    }
  });

  return `<svg viewBox="0 0 ${vbW} 84" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <rect width="${vbW}" height="84" fill="#0b1622"/>
    ${courtLines}
    ${arrowLines}${dots}
  </svg>`;
}

function renderSlideStrip() {
  const strip = document.getElementById('slide-strip');
  strip.innerHTML = '';

  slides.forEach((s, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'slide-thumb' + (i===currentSlideIdx ? ' active' : '');
    if(s.description) thumb.title = s.description;
    thumb.innerHTML =
      buildThumbSVG(s, courtType) +
      `<div class="slide-num">${i+1}</div>` +
      (slides.length > 1 ? `<button class="slide-del" onclick="event.stopPropagation();deleteSlide(${i})">×</button>` : '');
    thumb.addEventListener('click', () => loadSlide(i));
    strip.appendChild(thumb);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'slide-add';
  addBtn.innerHTML = '<span class="sa-plus">+</span><span class="sa-label">Paso</span>';
  addBtn.onclick = addSlide;
  strip.appendChild(addBtn);
}

// ══════════════════════════════════════════════════════════════════════════════
// BALL POSSESSION
// ══════════════════════════════════════════════════════════════════════════════
window.toggleBall = function() {
  if(selId===null) return;
  const item = items.find(i=>i.id===selId);
  if(!item || (item.type!=='off' && item.type!=='def')) return;
  ballPossessorId = (ballPossessorId===selId) ? null : selId;
  renderAll();
};

// ══════════════════════════════════════════════════════════════════════════════
// ANIMATION
// ══════════════════════════════════════════════════════════════════════════════
window.playAnim = function(onComplete) {
  if(animating) return;

  // ── Cortes y bloqueos: el jugador se mueve hasta la posición ──
  const moveAssignments = [];
  arrows.filter(a=>a.type==='move' || a.type==='screen').forEach(a => {
    const p = nearestPlayer(a.x1, a.y1, 9);
    if(!p) return;
    moveAssignments.push({ id:p.id, x1:a.x1, y1:a.y1, x2:a.x2, y2:a.y2, cx:a.cx, cy:a.cy });
  });

  // ── Pases: el balón viaja, el jugador se queda quieto ──
  const passAnimData = [];
  arrows.filter(a=>a.type==='pass').forEach(a => {
    if(ballPossessorId===null) return;
    const possessor = items.find(i=>i.id===ballPossessorId);
    if(!possessor) return;
    if(Math.hypot(possessor.x-a.x1, possessor.y-a.y1) > 12) return;

    // Crear elemento de balón temporal
    const ballEl = document.createElement('div');
    ballEl.className = 'ci animating';
    ballEl.style.cssText = `left:${possessor.x}%;top:${possessor.y}%;z-index:25;pointer-events:none;`;
    ballEl.innerHTML = '<div class="sh-ball"></div>';
    overlay.appendChild(ballEl);
    passAnimData.push({ el:ballEl, x1:possessor.x, y1:possessor.y, x2:a.x2, y2:a.y2, cx:a.cx, cy:a.cy });
  });

  if(!moveAssignments.length && !passAnimData.length) {
    showToast('Coloca jugadores cerca del inicio de las flechas');
    return;
  }

  // Guardar estado para reset
  animBase             = items.map(i=>({id:i.id, x:i.x, y:i.y}));
  animBallPossessorId  = ballPossessorId;
  animPassBalls        = passAnimData;
  animating            = true;
  btnPlay.disabled     = true;
  btnReset.style.display = '';

  // Quitar balón del poseedor durante el pase (visualmente)
  if(passAnimData.length) { ballPossessorId = null; renderItems(); }

  deselect();

  const t0 = performance.now();
  function tick(now) {
    const raw  = (now - t0) / ANIM_MS;
    const t    = Math.min(raw, 1);
    const ease = t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;

    // Animar jugadores en cortes
    moveAssignments.forEach(({ id, x1,y1,cx,cy,x2,y2 }) => {
      const base = animBase.find(b=>b.id===id);
      const item = items.find(i=>i.id===id);
      if(!base||!item) return;
      const pos = bezier(x1,y1,cx,cy,x2,y2,ease);
      item.x = pos.x; item.y = pos.y;
    });

    // Animar balón en pases
    animPassBalls.forEach(pa => {
      const pos = bezier(pa.x1, pa.y1, pa.cx, pa.cy, pa.x2, pa.y2, ease);
      pa.el.style.left = pos.x + '%';
      pa.el.style.top  = pos.y + '%';
    });

    renderItems();

    if(t<1) {
      animRAF = requestAnimationFrame(tick);
    } else {
      // Finalizar: eliminar balones temporales y transferir posesión
      animPassBalls.forEach(pa => {
        pa.el.remove();
        // Buscar jugador más cercano al destino del pase
        const recv = items
          .filter(i=>i.type==='off'||i.type==='def')
          .sort((a,b)=>Math.hypot(a.x-pa.x2,a.y-pa.y2)-Math.hypot(b.x-pa.x2,b.y-pa.y2))[0];
        ballPossessorId = (recv && Math.hypot(recv.x-pa.x2,recv.y-pa.y2)<12) ? recv.id : null;
      });
      animPassBalls = [];
      animating     = false;
      btnPlay.disabled = false;
      renderItems();
      if(onComplete) onComplete();
    }
  }
  animRAF = requestAnimationFrame(tick);
};

window.resetAnim = function() {
  const wasPlayingAll = playAllActive;

  // Abortar playAll si está activo
  if(playAllReject) { try { playAllReject('abort'); } catch(e){} }
  playAllActive = false; playAllReject = null;

  if(animRAF) { cancelAnimationFrame(animRAF); animRAF=null; }
  animPassBalls.forEach(pa => pa.el.remove());
  animPassBalls = [];
  animating = false;
  btnPlay.disabled = false;
  btnPlayAll.disabled = false;
  btnReset.style.display = 'none';

  if(animBase) {
    animBase.forEach(b=>{ const item=items.find(i=>i.id===b.id); if(item){item.x=b.x;item.y=b.y;} });
    animBase = null;
  }
  ballPossessorId = animBallPossessorId;

  if(wasPlayingAll) {
    // Si venimos de "Animar todo", volver al paso 1
    loadSlide(0, true);
  } else {
    renderAll();
    renderSlideStrip();
  }
};

// Reproduce todas las diapositivas secuencialmente (como un GIF)
window.playAll = async function() {
  if(animating || playAllActive) return;
  saveCurrentSlide();
  playAllActive = true;
  btnPlayAll.disabled = true;
  btnPlay.disabled    = true;
  btnReset.style.display = '';

  try {
    for(let i = 0; i < slides.length; i++) {
      if(!playAllActive) break;

      // Cargar el paso i (sin guardar, ya guardamos arriba)
      loadSlide(i, true);

      // Esperar a que termine la animación de este paso
      await new Promise((resolve, reject) => {
        playAllReject = reject;
        if(arrows.length > 0) {
          playAnim(resolve);
        } else {
          // Si no hay flechas, mostrar el paso brevemente
          setTimeout(resolve, 600);
        }
      });

      if(!playAllActive) break;

      // Pausa breve entre pasos (excepto el último)
      if(i < slides.length - 1) {
        await new Promise((resolve, reject) => {
          playAllReject = reject;
          setTimeout(resolve, 400);
        });
      }
    }
  } catch(e) {
    // Abortado por resetAnim — no hacer nada más
    return;
  }

  playAllActive = false;
  playAllReject = null;
  btnPlayAll.disabled = false;
  btnPlay.disabled    = false;
  renderSlideStrip();
};

// ══════════════════════════════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════════════════════════════
window.deleteSelected = function() {
  if(selId!==null) { snapHistory(); items=items.filter(i=>i.id!==selId); selId=null; }
  else if(selAid!==null) { snapHistory(); arrows=arrows.filter(a=>a.id!==selAid); selAid=null; }
  renderAll();
};

window.undoLast = function() {
  if(!history.length) return;
  const s=history.pop(); items=s.items; arrows=s.arrows; ballPossessorId=s.ballPossessorId;
  selId=null; selAid=null; renderAll(); showToast('Deshecho');
};

window.clearAll = function() {
  if(!items.length&&!arrows.length) return;
  snapHistory(); items=[]; arrows=[]; selId=null; selAid=null;
  resetAnim(); renderAll();
};

window.saveExercise = function() {
  try {
    const stored=JSON.parse(localStorage.getItem('hoopstats_ejercicios')||'[]');
    stored.push({ id:Date.now(), nombre:'Ejercicio', tipo:'tactico', duracion:'—', jugadores:'—', desc:'', courtItems:items, courtArrows:arrows, ballPossessorId });
    localStorage.setItem('hoopstats_ejercicios', JSON.stringify(stored));
    showToast('Guardado ✓');
    setTimeout(()=>{ window.location.href='ejercicios.html'; }, 900);
  } catch(err) { showToast('Error al guardar'); }
};

function showToast(msg) {
  toast.textContent=msg; toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2200);
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const inInput = ['INPUT','TEXTAREA'].includes(document.activeElement?.tagName);
  if((e.key==='Delete'||e.key==='Backspace') && !inInput) deleteSelected();
  if((e.ctrlKey||e.metaKey)&&e.key==='z') { e.preventDefault(); undoLast(); }
  if(e.key==='Escape') { deselect(); setMode('select'); }
  if(e.key==='1') setMode('select');
  if(e.key==='2') setMode('arrow-move');
  if(e.key==='3') setMode('arrow-pass');
  if(e.key==='4') setMode('arrow-screen');
});

// Guardar descripción en tiempo real
slideDescInput.addEventListener('input', () => {
  if(slides[currentSlideIdx]) slides[currentSlideIdx].description = slideDescInput.value;
});

// ── Init ──────────────────────────────────────────────────────────────────────
slides = [{ id: ++slideUid, items: [], arrows: [], ballPossessorId: null, description: '' }];
setMode('select');
renderAll();
renderSlideStrip();
</script>
