<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Liga 2025–26</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a14;color:#f1f5f9;font-family:'DM Sans',sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}

/* HEADER */
.header{background:linear-gradient(135deg,#0f0f1e,#141428);border-bottom:1px solid #1e1e2e;padding:18px 20px 0;position:sticky;top:0;z-index:200}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.header-title{font-size:21px;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(90deg,#facc15,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:11px;color:#4b5563;font-weight:500;margin-top:2px}
.header-badge{background:#1e1e2e;border-radius:10px;padding:5px 12px;font-size:12px;font-weight:700;color:#facc15;border:none}
.nav{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:8px 12px;background:none;border:none;border-bottom:2px solid transparent;font-size:12px;font-weight:700;color:#4b5563;transition:all .15s;white-space:nowrap}
.nav-btn.active{color:#facc15;border-bottom-color:#facc15}

/* CONTENT */
.content{padding:24px 16px;max-width:980px;margin:0 auto}
section{margin-bottom:44px}
.sec-title{font-size:19px;font-weight:900;color:#f1f5f9;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sec-sub{font-size:12px;color:#4b5563;font-weight:500;margin-left:28px;margin-bottom:18px}

/* BADGE */
.badge{display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-weight:800;color:#fff;letter-spacing:-0.5px;flex-shrink:0}

/* TABLE BASE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:9px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;color:#6b7280;text-transform:uppercase;border-bottom:2px solid #2a2a3a}
.tbl td{padding:11px 10px;font-size:13px;color:#9ca3af;border-bottom:1px solid #1a1a28}
.tbl tbody tr:hover{background:rgba(255,255,255,.03)}
.tbl tbody tr:nth-child(even){background:rgba(255,255,255,.01)}

/* STANDINGS */
.pos-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:800}
.team-cell{display:flex;align-items:center;gap:9px}
.team-name{font-weight:600;color:#f1f5f9;font-size:14px}
.pts-chip{border-radius:6px;padding:3px 9px;font-size:13px;font-weight:800}
.racha{display:flex;gap:3px;align-items:center}
.racha-dot{width:10px;height:10px;border-radius:50%}
.legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280}
.legend-dot{width:10px;height:10px;border-radius:3px}

/* JORNADA */
.jtabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.jtab{padding:7px 16px;border-radius:10px;border:none;font-size:13px;font-weight:700;transition:all .15s}
.jtab.active{background:#facc15;color:#0a0a14}
.jtab:not(.active){background:#1e1e2e;color:#9ca3af}
.game-card{background:#13131f;border:1px solid #2a2a3a;border-radius:14px;overflow:hidden;margin-bottom:10px}
.game-hdr{width:100%;background:none;border:none;padding:14px 18px;display:flex;align-items:center;gap:10px}
.game-hdr:hover{background:rgba(255,255,255,.02)}
.team-side{flex:1;display:flex;align-items:center;gap:8px}
.team-side.right{justify-content:flex-end}
.score-block{display:flex;align-items:center;gap:6px;min-width:100px;justify-content:center}
.score{font-size:24px;font-weight:900;font-variant-numeric:tabular-nums}
.score-sep{color:#3a3a4a;font-size:18px}
.game-players{border-top:1px solid #2a2a3a;display:grid;grid-template-columns:1fr 1fr}
.team-box{padding:14px 12px}
.team-box:first-child{border-right:1px solid #2a2a3a}
.team-box-hdr{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.ptbl{width:100%;border-collapse:collapse;font-size:11px}
.ptbl th{padding:3px 4px;font-size:9px;font-weight:700;letter-spacing:.06em;color:#4b5563;border-bottom:1px solid #2a2a3a;text-transform:uppercase}
.ptbl td{padding:5px 4px;border-bottom:1px solid #1a1a28;color:#9ca3af}
.ptbl .pname{color:#cbd5e1;font-weight:500;cursor:pointer}
.ptbl .pname:hover{color:#facc15;text-decoration:underline}

/* LÍDERES */
.stat-tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.stab{padding:6px 12px;border-radius:10px;border:none;font-size:12px;font-weight:700;transition:all .15s;display:flex;gap:4px;align-items:center}
.stab.active{background:#1d4ed8;color:#fff}
.stab:not(.active){background:#1e1e2e;color:#6b7280}
.leaders-wrap{background:#13131f;border-radius:14px;border:1px solid #2a2a3a;overflow:hidden}
.ltbl{width:100%;border-collapse:collapse}
.ltbl th{padding:10px 14px;font-size:10px;font-weight:700;letter-spacing:.08em;color:#4b5563;text-transform:uppercase;background:#0f0f1c;border-bottom:2px solid #2a2a3a}
.ltbl td{padding:10px 10px;font-size:13px}
.ltbl tbody tr{border-bottom:1px solid #1a1a28;transition:background .1s}
.ltbl tbody tr:nth-child(even){background:rgba(255,255,255,.01)}
.ltbl tbody tr:hover{background:rgba(255,255,255,.03)}
.bar-track{height:6px;border-radius:3px;background:#1e1e2e;overflow:hidden;min-width:70px}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.search-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-input{background:#1e1e2e;border:1px solid #2a2a3a;border-radius:10px;padding:8px 14px;color:#f1f5f9;font-size:13px;flex:1;min-width:160px;outline:none}
.search-input::placeholder{color:#4b5563}
.search-input:focus{border-color:#4b5563}
.team-filter{display:flex;gap:5px;flex-wrap:wrap}
.tfbtn{padding:5px 10px;border-radius:8px;border:none;font-size:11px;font-weight:700;transition:all .15s}
.tfbtn.active{color:#fff}
.tfbtn:not(.active){background:#1e1e2e;color:#6b7280}

/* HEAD TO HEAD */
.h2h-selectors{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.h2h-select{background:#1e1e2e;border:1px solid #2a2a3a;border-radius:10px;padding:8px 14px;color:#f1f5f9;font-size:13px;font-weight:600;outline:none;cursor:pointer}
.h2h-vs{font-size:16px;font-weight:900;color:#4b5563}
.h2h-summary{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;margin-bottom:20px;text-align:center}
.h2h-team-col{background:#13131f;border:1px solid #2a2a3a;border-radius:12px;padding:16px 10px}
.h2h-wins{font-size:36px;font-weight:900}
.h2h-label{font-size:11px;color:#4b5563;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.h2h-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.h2h-game{background:#13131f;border:1px solid #2a2a3a;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px}

/* EVOLUCIÓN */
.chart-wrap{background:#13131f;border:1px solid #2a2a3a;border-radius:14px;padding:20px;overflow-x:auto}
svg text{font-family:'DM Sans',sans-serif}

/* PLAYER MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#13131f;border:1px solid #2a2a3a;border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:85vh;overflow-y:auto;padding:20px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-close{background:#1e1e2e;border:none;color:#9ca3af;width:32px;height:32px;border-radius:8px;font-size:18px;display:flex;align-items:center;justify-content:center}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.stat-card{background:#0f0f1c;border-radius:10px;padding:12px;text-align:center}
.stat-card-val{font-size:22px;font-weight:900;color:#f1f5f9}
.stat-card-lbl{font-size:10px;color:#4b5563;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.stat-card-sub{font-size:11px;color:#6b7280;margin-top:2px}
.dd-badge{display:inline-flex;align-items:center;gap:5px;background:#7c3aed22;color:#a78bfa;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;margin-bottom:14px}

/* UTIL */
.tc{text-align:center}.tr{text-align:right}
.green{color:#4ade80}.red{color:#f87171}.yellow{color:#facc15}.gray{color:#6b7280}
.fw8{font-weight:800}.fw6{font-weight:600}
.hidden{display:none!important}
@media(max-width:600px){
  .game-players{grid-template-columns:1fr}
  .team-box:first-child{border-right:none;border-bottom:1px solid #2a2a3a}
  .score{font-size:20px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .h2h-summary{grid-template-columns:1fr auto 1fr}

const getTeam = id => TEAMS.find(t=>t.id===id);

function pctColor(pct){
  if(pct>=50)return"#4ade80";
  if(pct>=35)return"#facc15";
  return"#f87171";
}
function pmColor(v){ return v>0?"#4ade80":v<0?"#f87171":"#9ca3af"; }

function badgeHTML(teamId,size=32){
  const t=getTeam(teamId);
  return `<div class="badge" style="width:${size}px;height:${size}px;background:${t.color};font-size:${Math.round(size*.32)}px">${t.short}</div>`;
}

function shotPct(str){ const[m,a]=str.split('/').map(Number); return a>0?Math.round(m/a*100):0; }

let curStat='puntos', searchVal='', filterTeam=0;

function getLeaderRows(){
  const cfg=STATS_LEADERS[curStat];
  return Object.entries(PLAYER_STATS)
    .filter(([name,s])=>{
      if(filterTeam && s.team!==filterTeam)return false;
      if(searchVal && !name.toLowerCase().includes(searchVal.toLowerCase()))return false;
      return true;
    })
    .map(([name,s])=>({name,...s,sortVal:cfg.isShot?parseFloat(s[cfg.key]):s[cfg.key]}))
    .sort((a,b)=>b.sortVal-a.sortVal)
    .slice(0,10);
}

function renderLeaders(){
  const cfg=STATS_LEADERS[curStat];
  const rows=getLeaderRows();
  const maxVal=rows.length?Math.max(...rows.map(r=>r.sortVal)):1;
  const tabsHTML=STAT_TABS_ORDER.map(t=>`
    <button class="stab ${t.key===curStat?'active':''}" onclick="selectStat('${t.key}')">${t.icon} ${STATS_LEADERS[t.key].label}</button>
  `).join('');
  const teamFilters=`<div class="team-filter">
    <button class="tfbtn ${filterTeam===0?'active':''}" style="${filterTeam===0?'background:#1d4ed8':''}" onclick="setTeamFilter(0)">Todos</button>
    ${TEAMS.map(t=>`<button class="tfbtn ${filterTeam===t.id?'active':''}" style="${filterTeam===t.id?'background:'+t.color:''}" onclick="setTeamFilter(${t.id})">${t.short}</button>`).join('')}
  </div>`;
  const bodyHTML=rows.map((row,i)=>{
    const t=getTeam(row.team);
    const v=row.sortVal;
    const barW=maxVal?((Math.abs(v)/Math.max(...rows.map(r=>Math.abs(r.sortVal))))*100):0;
    const barColor=i===0?'#facc15':t.color+'cc';
    const valColor=cfg.isShot?pctColor(v):cfg.key==='pm'?pmColor(v):'#f1f5f9';
    const valStr=cfg.key==='pm'?(v>0?`+${v}`:v):cfg.isShot?`${v}%`:v;
    return`<tr>
      <td style="padding:10px 14px;color:${i===0?'#facc15':'#4b5563'};font-weight:800">${i===0?'★':i+1}</td>
      <td style="padding:10px 10px;color:#f1f5f9;font-weight:600;cursor:pointer" onclick="openPlayer('${row.name}')">${row.name}</td>
      <td style="padding:10px 10px">
        <div style="display:flex;align-items:center;gap:6px">${badgeHTML(row.team,20)}<span style="color:#6b7280;font-size:12px">${t.short}</span></div>
      </td>
      <td style="padding:10px 10px;text-align:center;font-weight:800;color:${valColor};font-variant-numeric:tabular-nums">${valStr}</td>
      <td style="padding:10px 14px"><div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${barColor}"></div></div></td>
    </tr>`;
  }).join('');
  document.getElementById('sec-lideres').innerHTML=`
    <div class="sec-title">📊 Líderes Estadísticos</div>
    <div class="sec-sub">Temporada 2025–26 · Clic en un jugador para ver su ficha</div>
    <div class="stat-tabs">${tabsHTML}</div>
    <div class="search-row">
      <input class="search-input" placeholder="🔍 Buscar jugador..." oninput="setSearch(this.value)" value="${searchVal}"/>
      ${teamFilters}
    </div>
    <div class="leaders-wrap">
      <table class="ltbl">
        <thead><tr>
          <th style="text-align:left;width:32px">#</th>
          <th style="text-align:left">Jugador</th>
          <th style="text-align:left">Equipo</th>
          <th class="tc">${cfg.unit}</th>
          <th style="text-align:left;min-width:90px">Barra</th>
        </tr></thead>
        <tbody>${bodyHTML||'<tr><td colspan="5" style="text-align:center;padding:20px;color:#4b5563">Sin resultados</td></tr>'}</tbody>
      </table>
    </div>`;
}
function selectStat(k){curStat=k;renderLeaders();}

// ═══════════════════════════════════════════════════════════════════ EVOLUCIÓN

function renderEvolucion(){
  const W=Math.min(window.innerWidth-60,900), H=280;
  const PAD={t:20,r:20,b:40,l:36};
  const innerW=W-PAD.l-PAD.r, innerH=H-PAD.t-PAD.b;
  const jCount=8;
  const xStep=innerW/(jCount-1);
  const yStep=innerH/(TEAMS.length-1);

  // grid lines
  let gridLines='';
  for(let i=0;i<jCount;i++){
    const x=PAD.l+i*xStep;
    gridLines+=`<line x1="${x}" y1="${PAD.t}" x2="${x}" y2="${PAD.t+innerH}" stroke="#1e1e2e" stroke-width="1"/>`;
    gridLines+=`<text x="${x}" y="${H-8}" text-anchor="middle" fill="#4b5563" font-size="11" font-weight="600">J${i+1}</text>`;
  }
  for(let p=1;p<=6;p++){
    const y=PAD.t+(p-1)*yStep;
    gridLines+=`<line x1="${PAD.l}" y1="${y}" x2="${PAD.l+innerW}" y2="${y}" stroke="#1e1e2e" stroke-width="1"/>`;
    gridLines+=`<text x="${PAD.l-6}" y="${y+4}" text-anchor="end" fill="#4b5563" font-size="11" font-weight="600">${p}º</text>`;
  }

  const lines=EVOLUCION.map(ev=>{
    const t=getTeam(ev.teamId);
    const pts=ev.positions.map((pos,i)=>{
      const x=PAD.l+i*xStep;
      const y=PAD.t+(pos-1)*yStep;
      return`${x},${y}`;
    });
    const d='M'+pts.join(' L');
    const circles=ev.positions.map((pos,i)=>{
      const x=PAD.l+i*xStep;
      const y=PAD.t+(pos-1)*yStep;
      return`<circle cx="${x}" cy="${y}" r="5" fill="${t.color}" stroke="#0a0a14" stroke-width="2"/>`;
    }).join('');
    return`<polyline points="${pts.join(' ')}" fill="none" stroke="${t.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity=".9"/>${circles}`;
  }).join('');

  const legendHTML=TEAMS.map(t=>`
    <div style="display:flex;align-items:center;gap:5px">
      <div style="width:20px;height:3px;border-radius:2px;background:${t.color}"></div>
      <span style="font-size:11px;color:#9ca3af">${t.name}</span>
    </div>`).join('');

  document.getElementById('sec-evolucion').innerHTML=`
    <div class="sec-title">📈 Evolución de la Clasificación</div>
    <div class="sec-sub">Posición por jornada · Arriba = mejor posición</div>
    <div class="chart-wrap">
      <svg width="${W}" height="${H}" style="display:block">
        ${gridLines}${lines}
      </svg>
      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:14px">${legendHTML}</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════ HEAD TO HEAD

let h2hTeam1=1, h2hTeam2=2;

function renderH2H(){
  const games=H2H_HISTORY.filter(g=>
    (g.homeId===h2hTeam1&&g.awayId===h2hTeam2)||(g.homeId===h2hTeam2&&g.awayId===h2hTeam1)
  );
  let t1wins=0, t2wins=0, t1pts=0, t2pts=0;
  games.forEach(g=>{
    const t1home=g.homeId===h2hTeam1;
    const t1score=t1home?g.homeScore:g.awayScore;
    const t2score=t1home?g.awayScore:g.homeScore;
    if(t1score>t2score)t1wins++;else t2wins++;
    t1pts+=t1score; t2pts+=t2score;
  });

  const selectOpts=id=>TEAMS.map(t=>`<option value="${t.id}" ${t.id===id?'selected':''}>${t.name}</option>`).join('');
  const t1=getTeam(h2hTeam1), t2=getTeam(h2hTeam2);

  const gamesHTML=games.length?games.map(g=>{
    const t1home=g.homeId===h2hTeam1;
    const t1score=t1home?g.homeScore:g.awayScore;
    const t2score=t1home?g.awayScore:g.homeScore;
    const t1win=t1score>t2score;
    return`<div class="h2h-game">
      <div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end">
        ${badgeHTML(h2hTeam1,24)}
        <span style="font-weight:${t1win?800:500};color:${t1win?'#f1f5f9':'#6b7280'};font-size:13px">${t1score}</span>
      </div>
      <span style="color:#4b5563;font-size:12px">J${g.j}</span>
      <div style="display:flex;align-items:center;gap:6px;flex:1">
        <span style="font-weight:${!t1win?800:500};color:${!t1win?'#f1f5f9':'#6b7280'};font-size:13px">${t2score}</span>
        ${badgeHTML(h2hTeam2,24)}
      </div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:24px;color:#4b5563;font-size:13px">No hay enfrentamientos entre estos equipos</div>`;

  document.getElementById('sec-h2h').innerHTML=`
    <div class="sec-title">⚔️ Head to Head</div>
    <div class="sec-sub">Historial de enfrentamientos directos</div>
    <div class="h2h-selectors">
      <select class="h2h-select" onchange="setH2H(1,parseInt(this.value))">${selectOpts(h2hTeam1)}</select>
      <span class="h2h-vs">VS</span>
      <select class="h2h-select" onchange="setH2H(2,parseInt(this.value))">${selectOpts(h2hTeam2)}</select>
    </div>
    ${games.length?`<div class="h2h-summary">
      <div class="h2h-team-col">
        ${badgeHTML(h2hTeam1,36)}
        <div class="h2h-wins" style="color:${t1.color}">${t1wins}</div>
        <div class="h2h-label">victorias</div>
        <div style="font-size:12px;color:#4b5563;margin-top:6px">${games.length>0?Math.round(t1pts/games.length):0} ppj</div>
      </div>
      <div class="h2h-mid">
        <div style="font-size:12px;color:#4b5563;font-weight:700">${games.length} partidos</div>
        <div style="font-size:11px;color:#2a2a3a">———</div>
        <div style="font-size:12px;color:#4b5563">${t1pts} – ${t2pts}</div>
      </div>
      <div class="h2h-team-col">
        ${badgeHTML(h2hTeam2,36)}
        <div class="h2h-wins" style="color:${t2.color}">${t2wins}</div>
        <div class="h2h-label">victorias</div>
        <div style="font-size:12px;color:#4b5563;margin-top:6px">${games.length>0?Math.round(t2pts/games.length):0} ppj</div>
      </div>
    </div>`:''}
    <div>${gamesHTML}</div>`;
}

function setH2H(pos,id){
  if(pos===1){if(id===h2hTeam2)h2hTeam2=h2hTeam1;h2hTeam1=id;}
  else{if(id===h2hTeam1)h2hTeam1=h2hTeam2;h2hTeam2=id;}
  renderH2H();
}

// ═══════════════════════════════════════════════════════════════════ PLAYER MODAL

function openPlayer(name){
  const s=PLAYER_STATS[name]; if(!s)return;
  const t=getTeam(s.team);
  const pmStr=s.pm>0?`+${s.pm}`:s.pm;
  const ddBadge=s.dd>0||s.td>0?`
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      ${s.dd>0?`<div class="dd-badge">🎯 ${s.dd} doble-doble${s.dd>1?'s':''}</div>`:''}
      ${s.td>0?`<div class="dd-badge" style="background:#f9731622;color:#fb923c">🔥 ${s.td} triple-doble${s.td>1?'s':''}</div>`:''}
    </div>`:'';
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-hdr">
      <div style="display:flex;align-items:center;gap:12px">
        ${badgeHTML(s.team,40)}
        <div>
          <div style="font-size:18px;font-weight:900;color:#f1f5f9">${name}</div>
          <div style="font-size:12px;color:${t.color};font-weight:700">${t.name}</div>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    ${ddBadge}
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-card-val yellow">${s.pts}</div><div class="stat-card-lbl">Puntos</div><div class="stat-card-sub">ppj</div></div>
      <div class="stat-card"><div class="stat-card-val">${s.reb}</div><div class="stat-card-lbl">Rebotes</div><div class="stat-card-sub">rpj</div></div>
      <div class="stat-card"><div class="stat-card-val">${s.ast}</div><div class="stat-card-lbl">Asistencias</div><div class="stat-card-sub">apj</div></div>
      <div class="stat-card"><div class="stat-card-val" style="color:#a78bfa">${s.pir}</div><div class="stat-card-lbl">Valoración</div><div class="stat-card-sub">PIR ppj</div></div>
      <div class="stat-card"><div class="stat-card-val" style="color:${pmColor(s.pm)}">${pmStr}</div><div class="stat-card-lbl">Plus/Minus</div><div class="stat-card-sub">ppj</div></div>
      <div class="stat-card"><div class="stat-card-val">${s.pj}</div><div class="stat-card-lbl">Partidos</div><div class="stat-card-sub">jugados</div></div>
    </div>
    <div style="background:#0f0f1c;border-radius:10px;padding:14px">
      <div style="font-size:11px;font-weight:700;color:#4b5563;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Eficiencia de tiro</div>
      ${[['Triples (T3)',s.t3,'#facc15'],['Tiros de 2 (T2)',s.t2,'#60a5fa'],['Tiros libres (T1)',s.t1,'#4ade80']].map(([lbl,pct,clr])=>{
        const v=parseInt(pct);
        return`<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:12px;color:#9ca3af">${lbl}</span>
            <span style="font-size:12px;font-weight:800;color:${clr}">${pct}</span>
          </div>
          <div class="bar-track" style="height:8px">
            <div class="bar-fill" style="width:${v}%;background:${clr}"></div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════════════ NAV

function showSection(id,btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['tabla','jornada','lideres','evolucion','h2h'].forEach(s=>{
    document.getElementById('sec-'+s).style.display=(id==='all'||id===s)?'':'none';
  });
}

// ═══════════════════════════════════════════════════════════════════ INIT

renderStandings();
renderJornada();
renderLeaders();
renderEvolucion();
renderH2H();
</script>
</body>
