<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HoopStats · Liga 2025–26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #cc1414; --red-dim: #991010; --red-glow: rgba(204,20,20,0.12);
    --bg: #111111; --panel: #1a1a1a; --panel2: #222222; --panel3: #2a2a2a;
    --border: #2e2e2e; --border2: #3a3a3a;
    --text: #f0f0f0; --text2: #aaaaaa; --muted: #666666;
    --green: #27ae60; --green-dim: rgba(39,174,96,0.15); --green-border: rgba(39,174,96,0.3);
    --red-border: rgba(204,20,20,0.3);
    --bebas: 'Bebas Neue', sans-serif;
    --barlow: 'Barlow Condensed', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --sidebar-w: 230px; --radius: 10px;
  }

  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--barlow); overflow: hidden; }
  button { font-family: var(--barlow); cursor: pointer; }
  input, select { font-family: var(--barlow); }

  .app { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; z-index: 10; }
  .sidebar-logo { padding: 28px 22px 22px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo-eyebrow { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .logo-name { font-family: var(--bebas); font-size: 28px; letter-spacing: 3px; line-height: 1; }
  .logo-club { font-size: 11px; color: var(--text2); font-weight: 600; margin-top: 4px; }
  .logo-accent { width: 40px; height: 3px; background: var(--red); margin-top: 12px; border-radius: 2px; }
  .sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
  .nav-section-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 14px 22px 6px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 22px; font-size: 14px; font-weight: 600; letter-spacing: 0.5px; color: var(--text2); border-left: 3px solid transparent; transition: background 0.15s, color 0.15s; text-decoration: none; }
  .nav-item:hover { background: var(--panel2); color: var(--text); }
  .nav-item.active { color: var(--red); border-left-color: var(--red); background: var(--red-glow); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
  .nav-item.active svg { opacity: 1; }
  .nav-badge { margin-left: auto; background: var(--red); color: white; font-size: 10px; font-family: var(--mono); padding: 1px 7px; border-radius: 20px; }
  .sidebar-bottom { padding: 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .user-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  .user-card:hover { background: var(--panel3); }
  .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--red); display: flex; align-items: center; justify-content: center; font-family: var(--bebas); font-size: 13px; letter-spacing: 1px; color: white; flex-shrink: 0; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 700; }
  .user-role { font-size: 11px; color: var(--muted); }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* TOPBAR */
  .topbar { padding: 20px 28px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--bg); }
  .topbar-left { display: flex; flex-direction: column; gap: 2px; }
  .topbar-breadcrumb { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .topbar-title { font-family: var(--bebas); font-size: 30px; letter-spacing: 2px; line-height: 1; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-pill { background: var(--red-glow); border: 1px solid var(--red-border); color: var(--red); font-size: 11px; font-weight: 700; padding: 5px 14px; border-radius: 4px; letter-spacing: 0.5px; }
  .topbar-season { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  /* SUBNAV */
  .subnav { display: flex; padding: 0 28px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
  .subnav::-webkit-scrollbar { display: none; }
  .subnav-btn { padding: 11px 14px; background: none; border: none; border-bottom: 2px solid transparent; font-size: 12px; font-weight: 700; letter-spacing: 0.8px; color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; text-transform: uppercase; margin-bottom: -1px; }
  .subnav-btn.active { color: var(--red); border-bottom-color: var(--red); }
  .subnav-btn:hover { color: var(--text); }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 24px 28px 32px; scroll-behavior: smooth; }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  section { margin-bottom: 40px; animation: fadeUp 0.3s ease both; }

  .sec-title { font-family: var(--bebas); font-size: 20px; letter-spacing: 2px; color: var(--text); margin-bottom: 4px; }
  .sec-sub { font-size: 11px; color: var(--muted); margin-bottom: 18px; letter-spacing: 0.3px; }

  /* TABLES */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th { padding: 9px 10px; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .tbl td { padding: 11px 10px; font-size: 13px; color: var(--text2); border-bottom: 1px solid var(--border); }
  .tbl tbody tr:hover { background: rgba(255,255,255,.02); }

  .pos-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 5px; font-size: 11px; font-weight: 700; font-family: var(--mono); }
  .team-cell { display: flex; align-items: center; gap: 9px; }
  .t-name { font-weight: 600; color: var(--text); font-size: 13px; }
  .pts-chip { border-radius: 4px; padding: 2px 9px; font-size: 13px; font-weight: 700; font-family: var(--mono); }
  .racha { display: flex; gap: 3px; align-items: center; }
  .racha-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend { display: flex; gap: 14px; margin-top: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* JORNADAS */
  .jtabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .jtab { padding: 5px 13px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 12px; font-weight: 700; transition: all .15s; font-family: var(--mono); cursor: pointer; }
  .jtab.active { background: var(--red); color: white; border-color: var(--red); }
  .jtab:not(.active) { background: var(--panel); color: var(--text2); }
  .jtab:not(.active):hover { background: var(--panel2); }

  .game-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; }
  .game-hdr { width: 100%; background: none; border: none; padding: 14px 18px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .game-hdr:hover { background: var(--panel2); }
  .team-side { flex: 1; display: flex; align-items: center; gap: 8px; }
  .team-side.right { justify-content: flex-end; }
  .score-block { display: flex; align-items: center; gap: 6px; min-width: 100px; justify-content: center; }
  .score { font-size: 24px; font-weight: 700; font-family: var(--mono); }
  .score-sep { color: var(--border2); font-size: 18px; font-family: var(--mono); }
  .game-players { border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; }
  .team-box { padding: 14px 12px; }
  .team-box:first-child { border-right: 1px solid var(--border); }
  .team-box-hdr { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }
  .ptbl { width: 100%; border-collapse: collapse; font-size: 11px; }
  .ptbl th { padding: 3px 4px; font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border); text-transform: uppercase; }
  .ptbl td { padding: 5px 4px; border-bottom: 1px solid var(--border); color: var(--text2); }
  .pname { color: var(--text) !important; font-weight: 600; cursor: pointer; }
  .pname:hover { color: var(--red) !important; text-decoration: underline; }

  /* LÍDERES */
  .stat-tabs { display: flex; gap: 5px; margin-bottom: 18px; flex-wrap: wrap; }
  .stab { padding: 5px 11px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 11px; font-weight: 700; transition: all .15s; cursor: pointer; letter-spacing: 0.3px; }
  .stab.active { background: var(--red); color: white; border-color: var(--red); }
  .stab:not(.active) { background: var(--panel); color: var(--text2); }
  .stab:not(.active):hover { background: var(--panel2); }
  .leaders-wrap { background: var(--panel); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .ltbl { width: 100%; border-collapse: collapse; }
  .ltbl th { padding: 10px 14px; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; background: var(--panel2); border-bottom: 1px solid var(--border); }
  .ltbl td { padding: 10px; font-size: 13px; }
  .ltbl tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  .ltbl tbody tr:hover { background: rgba(255,255,255,.02); }
  .bar-track { height: 4px; border-radius: 2px; background: var(--panel2); overflow: hidden; min-width: 70px; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }

  .search-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .search-input { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; color: var(--text); font-size: 13px; flex: 1; min-width: 160px; outline: none; }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--red); }
  .team-filter { display: flex; gap: 5px; flex-wrap: wrap; }
  .tfbtn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); font-size: 11px; font-weight: 700; transition: all .15s; cursor: pointer; font-family: var(--mono); }
  .tfbtn.active { color: #fff; border-color: transparent; }
  .tfbtn:not(.active) { background: var(--panel); color: var(--muted); }
  .tfbtn:not(.active):hover { background: var(--panel2); color: var(--text); }

  /* H2H */
  .h2h-selectors { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .h2h-select { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; color: var(--text); font-size: 13px; font-weight: 600; outline: none; cursor: pointer; }
  .h2h-select:focus { border-color: var(--red); }
  .h2h-vs { font-family: var(--bebas); font-size: 18px; letter-spacing: 2px; color: var(--muted); }
  .h2h-summary { display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; margin-bottom: 20px; text-align: center; }
  .h2h-team-col { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 10px; }
  .h2h-wins { font-family: var(--bebas); font-size: 42px; letter-spacing: 2px; line-height: 1; }
  .h2h-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  .h2h-mid { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .h2h-game { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }

  /* EVOLUCIÓN */
  .chart-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; overflow-x: auto; }
  svg text { font-family: var(--mono); }

  /* BADGE */
  .badge { display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: 700; color: #fff; flex-shrink: 0; font-family: var(--mono); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 500; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px 14px 0 0; width: 100%; max-width: 640px; max-height: 85vh; overflow-y: auto; padding: 24px; }
  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-close { background: var(--panel2); border: 1px solid var(--border); color: var(--text2); width: 32px; height: 32px; border-radius: 8px; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .modal-close:hover { background: var(--panel3); }
  .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 18px; }
  .stat-card { background: var(--panel2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
  .stat-card-val { font-family: var(--bebas); font-size: 28px; letter-spacing: 1px; line-height: 1; }
  .stat-card-lbl { font-size: 9px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }
  .stat-card-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .dd-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--red-glow); color: var(--red); border: 1px solid var(--red-border); border-radius: var(--radius); padding: 5px 12px; font-size: 12px; font-weight: 700; margin-bottom: 14px; }

  .tc { text-align: center; } .tr { text-align: right; }
  .hidden { display: none !important; }

  /* BOTTOM NAV */
  .bnav-label { display: none; font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--muted); line-height: 1; }
  .bnav-item.active .bnav-label { color: var(--red); }
  @media (min-width: 360px) { .bnav-label { display: block; } .bottom-nav { height: 66px; } }
  .bottom-nav { display: none; height: 56px; background: var(--panel); border-top: 1px solid var(--border); flex-shrink: 0; }
  .bnav-inner { display: flex; height: 100%; }
  .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; text-decoration: none; -webkit-tap-highlight-color: transparent; transition: background 0.1s; }
  .bnav-item:active { background: var(--panel2); }
  .bnav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .bnav-icon svg { width: 22px; height: 22px; }
  .bnav-item.active .bnav-icon svg { stroke: var(--red); }
  .bnav-item:not(.active) .bnav-icon svg { stroke: var(--muted); }
  .bnav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--red); }

  /* MOBILE TOPBAR */
  .mobile-topbar { display: none; padding: 14px 18px 10px; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
  .mob-logo { font-family: var(--bebas); font-size: 22px; letter-spacing: 2px; }
  .mob-logo span { color: var(--red); }
  .mob-right { display: flex; align-items: center; gap: 10px; }
  .mob-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--red); display: flex; align-items: center; justify-content: center; font-family: var(--bebas); font-size: 12px; color: white; }
  .mob-jornada { font-size: 10px; color: var(--muted); font-family: var(--mono); background: var(--panel2); border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px; }

  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { display: none; }
    .mobile-topbar { display: flex; width: 100%; }
    .bottom-nav { display: flex; width: 100%; }
    .topbar { display: none; }
    .content { padding: 14px 14px 16px; }
    .subnav { padding: 0 14px; }
    .game-players { grid-template-columns: 1fr; }
    .team-box:first-child { border-right: none; border-bottom: 1px solid var(--border); }
    .score { font-size: 20px; }
    .stat-grid { grid-template-columns: repeat(2,1fr); }
    .h2h-summary { grid-template-columns: 1fr auto 1fr; }
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-eyebrow">Temporada 2025–26</div>
      <div class="logo-name">HoopStats</div>
      <div class="logo-club">Sa Cabaneta A · Fontaneria Jose Puerta</div>
      <div class="logo-accent"></div>
    </div>
    <nav class="sidebar-nav">

      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>

      <a href="liga.html" class="nav-item active">

    <div class="sidebar-bottom">
      <div class="user-card">
        <div class="user-avatar">JP</div>
        <div class="user-info">
          <div class="user-name">Jordi P.</div>
          <div class="user-role">Entrenador</div>

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      </div>
    </div>
  </aside>

  <div class="main">

    <div class="mobile-topbar">
      <div class="mob-logo">Hoop<span>Stats</span></div>

        <div class="mob-jornada">J8</div>
        <div class="mob-avatar">JP</div>
      </div>

    <div class="topbar">
      <div class="topbar-left">

        <div class="topbar-title">Liga</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-season">Jornada 8 de 18</div>
        <div class="topbar-pill" id="leader-pill">—</div>
      </div>
    </div>

    <div class="subnav">
      <button class="subnav-btn active" onclick="showSection('all',this)">Todo</button>
      <button class="subnav-btn" onclick="showSection('tabla',this)">Clasificación</button>
      <button class="subnav-btn" onclick="showSection('jornada',this)">Jornadas</button>
      <button class="subnav-btn" onclick="showSection('lideres',this)">Líderes</button>
      <button class="subnav-btn" onclick="showSection('evolucion',this)">Evolución</button>
      <button class="subnav-btn" onclick="showSection('h2h',this)">H2H</button>

    <div class="content">
      <section id="sec-tabla"></section>
      <section id="sec-jornada"></section>
      <section id="sec-lideres"></section>
      <section id="sec-evolucion"></section>
      <section id="sec-h2h"></section>
    </div>

    <nav class="bottom-nav">
      <div class="bnav-inner">
        <a href="index.html" class="bnav-item">

          const rachaHTML=row.racha.map(w=>`<div class="racha-dot" style="background:${w?'#27ae60':'#e74c3c'}"></div>`).join('');
          return`<tr>
            <td><span class="pos-badge" style="background:${posBg};color:${posClr}">${row.pos}</span></td>
            <td><div class="team-cell">${badgeHTML(row.teamId,26)}<span class="t-name">${t.name}</span></div></td>
            <td class="tc" style="color:#aaaaaa">${row.pj}</td>
            <td class="tc" style="color:#aaaaaa">${row.pg}</td>
            <td class="tc" style="color:#aaaaaa">${row.pp}</td>
            <td class="tc" style="color:#aaaaaa">${row.pf}</td>
            <td class="tc" style="color:#aaaaaa">${row.pc}</td>
            <td class="tc" style="font-weight:700;color:${difClr};font-family:var(--mono)">${difStr}</td>
            <td class="tc"><span class="pts-chip" style="background:${t.color}22;color:${t.color}">${row.pts}</span></td>
            <td><div class="racha">${rachaHTML}</div></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#cc1414"></div>Playoffs</div>
      <div class="legend-item"><div class="legend-dot" style="background:#333"></div>Descenso</div>
      <div class="legend-item"><div class="racha-dot" style="background:#27ae60;display:inline-block"></div>&nbsp;Victoria</div>
      <div class="legend-item"><div class="racha-dot" style="background:#e74c3c;display:inline-block"></div>&nbsp;Derrota</div>
    </div>`;
}

// JORNADAS
let curJornada=JORNADAS[0].id, expandedGame=null;

function renderJornada(){
  const tabsHTML=JORNADAS.map(j=>`
    <button class="jtab ${j.id===curJornada?'active':''}" onclick="selectJornada(${j.id})">${j.label}</button>
  `).join('');
  const jornada=JORNADAS.find(j=>j.id===curJornada);
  const gamesHTML=jornada.games.map(game=>{
    const home=getTeam(game.homeId),away=getTeam(game.awayId);
    const homeWin=game.homeScore>game.awayScore,isExp=expandedGame===game.id;
    const playersHTML=isExp?`
      <div class="game-players">
        ${[game.homeId,game.awayId].map(tid=>{
          const t=getTeam(tid),players=game.players[tid];
          return`<div class="team-box">
            <div class="team-box-hdr">${badgeHTML(tid,20)}<span style="font-size:11px;font-weight:700;color:${t.color};text-transform:uppercase;letter-spacing:.04em">${t.name}</span></div>
            <table class="ptbl">
              <thead><tr>
                <th style="text-align:left">Jugador</th>
                <th class="tc">PTS</th><th class="tc">REB</th><th class="tc">AST</th>
                <th class="tc">T3</th><th class="tc">T2</th><th class="tc">T1</th>
                <th class="tc">PIR</th><th class="tc">+/-</th>
              </tr></thead>
              <tbody>${players.map(p=>{
                const pir=calcPIR(p);
                const pmStr=p.pm>0?`+${p.pm}`:p.pm;
                return`<tr>
                  <td class="pname" onclick="openPlayer('${p.name}')">${p.name}</td>
                  <td style="text-align:center;font-weight:700;color:#cc1414;font-family:var(--mono)">${p.pts}</td>
                  <td class="tc" style="font-family:var(--mono)">${p.reb}</td>
                  <td class="tc" style="font-family:var(--mono)">${p.ast}</td>
                  <td class="tc" style="color:${pctColor(shotPct(p.t3))};font-weight:600">${p.t3}</td>
                  <td class="tc" style="color:${pctColor(shotPct(p.t2))};font-weight:600">${p.t2}</td>
                  <td class="tc" style="color:${pctColor(shotPct(p.t1))};font-weight:600">${p.t1}</td>
                  <td class="tc" style="font-weight:700;font-family:var(--mono);color:${pir>=20?'#cc1414':pir>=12?'#f0f0f0':'#aaaaaa'}">${pir}</td>
                  <td class="tc" style="font-weight:700;font-family:var(--mono);color:${pmColor(p.pm)}">${pmStr}</td>
                </tr>`}).join('')}
              </tbody>
            </table>
          </div>`;
        }).join('')}
      </div>`:'';
    return`<div class="game-card">
      <button class="game-hdr" onclick="toggleGame('${game.id}')">
        <div class="team-side right">
          <span style="font-size:13px;font-weight:${homeWin?700:500};color:${homeWin?'#f0f0f0':'#666666'}">${home.name}</span>
          ${badgeHTML(game.homeId,32)}
        </div>
        <div class="score-block">
          <span class="score" style="color:${homeWin?'#f0f0f0':'#666666'}">${game.homeScore}</span>
          <span class="score-sep">–</span>
          <span class="score" style="color:${!homeWin?'#f0f0f0':'#666666'}">${game.awayScore}</span>
        </div>
        <div class="team-side">
          ${badgeHTML(game.awayId,32)}
          <span style="font-size:13px;font-weight:${!homeWin?700:500};color:${!homeWin?'#f0f0f0':'#666666'}">${away.name}</span>
        </div>
        <span style="color:#3a3a3a;font-size:14px;margin-left:4px">${isExp?'▲':'▼'}</span>
      </button>
      ${playersHTML}
    </div>`;
  }).join('');
  document.getElementById('sec-jornada').innerHTML=`
    <div class="sec-title">Resultados por Jornada</div>
    <div class="sec-sub">Top 5 jugadores · Haz clic en un nombre para ver su ficha</div>
    <div class="jtabs">${tabsHTML}</div>
    <div>${gamesHTML}</div>`;
}
function selectJornada(id){curJornada=id;expandedGame=null;renderJornada();}
function toggleGame(id){expandedGame=expandedGame===id?null:id;renderJornada();}

// LÍDERES
let curStat='puntos',searchVal='',filterTeam=0;

function getLeaderRows(){
  const cfg=STATS_LEADERS[curStat];
  return Object.entries(PLAYER_STATS)
    .filter(([name,s])=>{
      if(filterTeam&&s.team!==filterTeam)return false;
      if(searchVal&&!name.toLowerCase().includes(searchVal.toLowerCase()))return false;
      return true;
    })
    .map(([name,s])=>({name,...s,sortVal:cfg.isShot?parseFloat(s[cfg.key]):s[cfg.key]}))
    .sort((a,b)=>b.sortVal-a.sortVal)
    .slice(0,10);
}

function renderLeaders(){
  const cfg=STATS_LEADERS[curStat];
  const rows=getLeaderRows();
  const maxAbs=rows.length?Math.max(...rows.map(r=>Math.abs(r.sortVal))):1;
  const tabsHTML=STAT_TABS_ORDER.map(t=>`
    <button class="stab ${t.key===curStat?'active':''}" onclick="selectStat('${t.key}')">${STATS_LEADERS[t.key].label}</button>
  `).join('');
  const teamFilters=`<div class="team-filter">
    <button class="tfbtn ${filterTeam===0?'active':''}" style="${filterTeam===0?'background:#cc1414;border-color:#cc1414':''}" onclick="setTeamFilter(0)">Todos</button>
    ${TEAMS.map(t=>`<button class="tfbtn ${filterTeam===t.id?'active':''}" style="${filterTeam===t.id?'background:'+t.color+';border-color:'+t.color:''}" onclick="setTeamFilter(${t.id})">${t.short}</button>`).join('')}
  </div>`;
  const bodyHTML=rows.map((row,i)=>{
    const t=getTeam(row.team);
    const v=row.sortVal;
    const barW=maxAbs?((Math.abs(v)/maxAbs)*100):0;
    const barColor=i===0?'#cc1414':t.color+'cc';
    const valColor=cfg.isShot?pctColor(v):cfg.key==='pm'?pmColor(v):'#f0f0f0';
    const valStr=cfg.key==='pm'?(v>0?`+${v}`:v):cfg.isShot?`${v}%`:v;
    return`<tr>
      <td style="padding:10px 14px;color:${i===0?'#cc1414':'#666666'};font-weight:700;font-family:var(--mono)">${i===0?'★':i+1}</td>
      <td style="padding:10px;color:#f0f0f0;font-weight:600;cursor:pointer" onclick="openPlayer('${row.name}')">${row.name}</td>
      <td style="padding:10px">
        <div style="display:flex;align-items:center;gap:6px">${badgeHTML(row.team,20)}<span style="color:#666666;font-size:12px;font-family:var(--mono)">${t.short}</span></div>
      </td>
      <td style="padding:10px;text-align:center;font-weight:700;color:${valColor};font-family:var(--mono)">${valStr}</td>
      <td style="padding:10px 14px"><div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${barColor}"></div></div></td>
    </tr>`;
  }).join('');
  document.getElementById('sec-lideres').innerHTML=`
    <div class="sec-title">Líderes Estadísticos</div>
    <div class="sec-sub">Temporada 2025–26 · Clic en un jugador para ver su ficha</div>
    <div class="stat-tabs">${tabsHTML}</div>
    <div class="search-row">
      <input class="search-input" placeholder="Buscar jugador..." oninput="setSearch(this.value)" value="${searchVal}"/>
      ${teamFilters}
    </div>
    <div class="leaders-wrap">
      <table class="ltbl">
        <thead><tr>
          <th style="text-align:left;width:32px">#</th>
          <th style="text-align:left">Jugador</th>
          <th style="text-align:left">Equipo</th>
          <th class="tc">${cfg.unit}</th>
          <th style="text-align:left;min-width:90px">Barra</th>
        </tr></thead>
        <tbody>${bodyHTML||'<tr><td colspan="5" style="text-align:center;padding:24px;color:#666666">Sin resultados</td></tr>'}</tbody>
      </table>
    </div>`;
}
function selectStat(k){curStat=k;renderLeaders();}
function setSearch(v){searchVal=v;renderLeaders();}
function setTeamFilter(id){filterTeam=id;renderLeaders();}

// EVOLUCIÓN
function renderEvolucion(){
  const W=Math.min(window.innerWidth-60,900),H=280;
  const PAD={t:20,r:20,b:40,l:36};
  const innerW=W-PAD.l-PAD.r,innerH=H-PAD.t-PAD.b;
  const jCount=8,xStep=innerW/(jCount-1),yStep=innerH/(TEAMS.length-1);
  let gridLines='';
  for(let i=0;i<jCount;i++){
    const x=PAD.l+i*xStep;
    gridLines+=`<line x1="${x}" y1="${PAD.t}" x2="${x}" y2="${PAD.t+innerH}" stroke="#2e2e2e" stroke-width="1"/>`;
    gridLines+=`<text x="${x}" y="${H-8}" text-anchor="middle" fill="#666666" font-size="11" font-weight="600">J${i+1}</text>`;
  }
  for(let p=1;p<=6;p++){
    const y=PAD.t+(p-1)*yStep;
    gridLines+=`<line x1="${PAD.l}" y1="${y}" x2="${PAD.l+innerW}" y2="${y}" stroke="#2e2e2e" stroke-width="1"/>`;
    gridLines+=`<text x="${PAD.l-6}" y="${y+4}" text-anchor="end" fill="#666666" font-size="11" font-weight="600">${p}º</text>`;
  }
  const lines=EVOLUCION.map(ev=>{
    const t=getTeam(ev.teamId);
    const pts=ev.positions.map((pos,i)=>`${PAD.l+i*xStep},${PAD.t+(pos-1)*yStep}`);
    const circles=ev.positions.map((pos,i)=>{
      const x=PAD.l+i*xStep,y=PAD.t+(pos-1)*yStep;
      return`<circle cx="${x}" cy="${y}" r="4" fill="${t.color}" stroke="#111111" stroke-width="2"/>`;
    }).join('');
    return`<polyline points="${pts.join(' ')}" fill="none" stroke="${t.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity=".9"/>${circles}`;
  }).join('');
  const legendHTML=TEAMS.map(t=>`
    <div style="display:flex;align-items:center;gap:5px">
      <div style="width:18px;height:3px;border-radius:2px;background:${t.color}"></div>
      <span style="font-size:11px;color:#aaaaaa;font-family:var(--barlow)">${t.name}</span>
    </div>`).join('');
  document.getElementById('sec-evolucion').innerHTML=`
    <div class="sec-title">Evolución de la Clasificación</div>
    <div class="sec-sub">Posición por jornada · Arriba = mejor posición</div>
    <div class="chart-wrap">
      <svg width="${W}" height="${H}" style="display:block">${gridLines}${lines}</svg>
      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:14px">${legendHTML}</div>
    </div>`;
}

// H2H
let h2hTeam1=1,h2hTeam2=2;

function renderH2H(){
  const games=H2H_HISTORY.filter(g=>(g.homeId===h2hTeam1&&g.awayId===h2hTeam2)||(g.homeId===h2hTeam2&&g.awayId===h2hTeam1));
  let t1wins=0,t2wins=0,t1pts=0,t2pts=0;
  games.forEach(g=>{
    const t1home=g.homeId===h2hTeam1;
    const t1s=t1home?g.homeScore:g.awayScore,t2s=t1home?g.awayScore:g.homeScore;
    if(t1s>t2s)t1wins++;else t2wins++;
    t1pts+=t1s;t2pts+=t2s;
  });
  const selectOpts=id=>TEAMS.map(t=>`<option value="${t.id}" ${t.id===id?'selected':''}>${t.name}</option>`).join('');
  const t1=getTeam(h2hTeam1),t2=getTeam(h2hTeam2);
  const gamesHTML=games.length?games.map(g=>{
    const t1home=g.homeId===h2hTeam1;
    const t1s=t1home?g.homeScore:g.awayScore,t2s=t1home?g.awayScore:g.homeScore;
    const t1win=t1s>t2s;
    return`<div class="h2h-game">
      <div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end">
        ${badgeHTML(h2hTeam1,24)}
        <span style="font-weight:${t1win?700:500};color:${t1win?'#f0f0f0':'#666666'};font-size:13px;font-family:var(--mono)">${t1s}</span>
      </div>
      <span style="color:#666666;font-size:12px;font-family:var(--mono)">J${g.j}</span>
      <div style="display:flex;align-items:center;gap:6px;flex:1">
        <span style="font-weight:${!t1win?700:500};color:${!t1win?'#f0f0f0':'#666666'};font-size:13px;font-family:var(--mono)">${t2s}</span>
        ${badgeHTML(h2hTeam2,24)}
      </div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:32px;color:#666666;font-size:13px">No hay enfrentamientos entre estos equipos</div>`;

  document.getElementById('sec-h2h').innerHTML=`
    <div class="sec-title">Head to Head</div>
    <div class="sec-sub">Historial de enfrentamientos directos</div>
    <div class="h2h-selectors">
      <select class="h2h-select" onchange="setH2H(1,parseInt(this.value))">${selectOpts(h2hTeam1)}</select>
      <span class="h2h-vs">VS</span>
      <select class="h2h-select" onchange="setH2H(2,parseInt(this.value))">${selectOpts(h2hTeam2)}</select>
    </div>
    ${games.length?`<div class="h2h-summary">
      <div class="h2h-team-col">
        ${badgeHTML(h2hTeam1,36)}
        <div class="h2h-wins" style="color:${t1.color}">${t1wins}</div>
        <div class="h2h-label">victorias</div>
        <div style="font-size:12px;color:#666666;margin-top:6px;font-family:var(--mono)">${games.length>0?Math.round(t1pts/games.length):0} ppj</div>
      </div>
      <div class="h2h-mid">
        <div style="font-size:12px;color:#666666;font-weight:700;font-family:var(--mono)">${games.length} partidos</div>
        <div style="font-size:11px;color:#2e2e2e">———</div>
        <div style="font-size:12px;color:#666666;font-family:var(--mono)">${t1pts} – ${t2pts}</div>
      </div>
      <div class="h2h-team-col">
        ${badgeHTML(h2hTeam2,36)}
        <div class="h2h-wins" style="color:${t2.color}">${t2wins}</div>
        <div class="h2h-label">victorias</div>
        <div style="font-size:12px;color:#666666;margin-top:6px;font-family:var(--mono)">${games.length>0?Math.round(t2pts/games.length):0} ppj</div>
      </div>
    </div>`:''}
    <div>${gamesHTML}</div>`;
}
function setH2H(pos,id){
  if(pos===1){if(id===h2hTeam2)h2hTeam2=h2hTeam1;h2hTeam1=id;}
  else{if(id===h2hTeam1)h2hTeam1=h2hTeam2;h2hTeam2=id;}
  renderH2H();
}

// PLAYER MODAL
function openPlayer(name){
  const s=PLAYER_STATS[name];if(!s)return;
  const t=getTeam(s.team);
  const pmStr=s.pm>0?`+${s.pm}`:s.pm;
  const ddBadge=s.dd>0||s.td>0?`
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      ${s.dd>0?`<div class="dd-badge">${s.dd} doble-doble${s.dd>1?'s':''}</div>`:''}
      ${s.td>0?`<div class="dd-badge">${s.td} triple-doble${s.td>1?'s':''}</div>`:''}
    </div>`:'';
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-hdr">
      <div style="display:flex;align-items:center;gap:12px">
        ${badgeHTML(s.team,40)}
        <div>
          <div style="font-family:var(--bebas);font-size:22px;letter-spacing:1px">${name}</div>
          <div style="font-size:12px;color:${t.color};font-weight:700">${t.name}</div>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    ${ddBadge}
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-card-val" style="color:#cc1414">${s.pts}</div><div class="stat-card-lbl">Puntos</div><div class="stat-card-sub">ppj</div></div>
      <div class="stat-card"><div class="stat-card-val">${s.reb}</div><div class="stat-card-lbl">Rebotes</div><div class="stat-card-sub">rpj</div></div>
      <div class="stat-card"><div class="stat-card-val">${s.ast}</div><div class="stat-card-lbl">Asistencias</div><div class="stat-card-sub">apj</div></div>
      <div class="stat-card"><div class="stat-card-val">${s.pir}</div><div class="stat-card-lbl">Valoración</div><div class="stat-card-sub">PIR ppj</div></div>
      <div class="stat-card"><div class="stat-card-val" style="color:${pmColor(s.pm)}">${pmStr}</div><div class="stat-card-lbl">Plus/Minus</div><div class="stat-card-sub">ppj</div></div>
      <div class="stat-card"><div class="stat-card-val">${s.pj}</div><div class="stat-card-lbl">Partidos</div><div class="stat-card-sub">jugados</div></div>
    </div>
    <div style="background:#161616;border:1px solid var(--border);border-radius:var(--radius);padding:14px">
      <div style="font-size:9px;font-weight:700;color:#666666;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px">Eficiencia de tiro</div>
      ${[['Triples (T3)',s.t3,'#cc1414'],['Tiros de 2 (T2)',s.t2,'#007AC1'],['Tiros libres (T1)',s.t1,'#27ae60']].map(([lbl,pct,clr])=>{
        const v=parseInt(pct);
        return`<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:12px;color:#aaaaaa">${lbl}</span>
            <span style="font-size:12px;font-weight:700;color:${clr};font-family:var(--mono)">${pct}</span>
          </div>
          <div class="bar-track" style="height:6px">
            <div class="bar-fill" style="width:${v}%;background:${clr}"></div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

// NAV
function showSection(id,btn){
  document.querySelectorAll('.subnav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['tabla','jornada','lideres','evolucion','h2h'].forEach(s=>{
    document.getElementById('sec-'+s).style.display=(id==='all'||id===s)?'':'none';
  });
}

renderStandings();
renderJornada();
renderLeaders();
renderEvolucion();
renderH2H();

// Pill del líder — siempre refleja el #1 de STANDINGS
(function updateLeaderPill(){
  const pill = document.getElementById('leader-pill');
  if (!pill || !STANDINGS.length) return;
  const leader = STANDINGS[0];
  const t = getTeam(leader.teamId);
  pill.textContent = (t ? t.name : '?') + ' lidera';
})();
